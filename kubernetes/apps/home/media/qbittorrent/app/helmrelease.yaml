---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      qbittorrent:
        annotations:
          reloader.stakater.com/auto: "true"
          vault.security.banzaicloud.io/vault-role: "default"
        initContainers:
          init-config:
            image:
              repository: alpine
              tag: "3.20"
            command:
              - /bin/sh
              - -c
              - |
                set -e
                mkdir -p /config/qBittorrent
                touch /config/qBittorrent/qBittorrent.conf

                # Use sed to update or add WebUI settings
                update_config() {
                  section=$1
                  key=$2
                  value=$3

                  # Check if key exists in any section (simplified for single-level keys)
                  if grep -q "^${key}=" /config/qBittorrent/qBittorrent.conf; then
                    sed -i "s|^${key}=.*|${key}=${value}|" /config/qBittorrent/qBittorrent.conf
                  else
                    # Add to end of file if it doesn't exist
                    echo "${key}=${value}" >> /config/qBittorrent/qBittorrent.conf
                  fi
                }

                update_config "Preferences" "WebUI\Username" "$${QBIT_USERNAME}"
                update_config "Preferences" "WebUI\Password_PBKDF2" "$${QBIT_PASSWORD}"
            env:
              QBIT_USERNAME: "vault:secret/data/qbittorrent#USERNAME"
              QBIT_PASSWORD: "vault:secret/data/qbittorrent#PASSWORD"
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
        containers:
          app:
            image:
              repository: ghcr.io/onedr0p/qbittorrent
              tag: 4.6.4
            env:
              TZ: America/New_York
              QBITTORRENT__PORT: &port 8080
              QBITTORRENT__BT_PORT: 50413
            resources:
              requests:
                cpu: 10m
                memory: 250Mi
              limits:
                memory: 2Gi
    service:
      app:
        controller: qbittorrent
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: qBittorrent
          gethomepage.dev/description: Torrent Client
          gethomepage.dev/group: Media
          gethomepage.dev/icon: qbittorrent.png
        hostnames:
          - "{{ .Release.Name }}.${DOMAIN1}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
      downloads:
        existingClaim: copyparty-hdd
        globalMounts:
          - path: /downloads
            subPath: qbittorrent

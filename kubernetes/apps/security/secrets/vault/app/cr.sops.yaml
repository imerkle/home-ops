apiVersion: vault.banzaicloud.com/v1alpha1
kind: Vault
metadata:
  name: vault
spec:
  annotations:
    reloader.stakater.com/auto: "true"
  config:
    listener:
      tcp:
        address: '[::]:8200'
        cluster_address: '[::]:8201'
        tls_disable: true
    storage:
      file:
        path: /vault/file
    ui: true
  envsConfig:
    - name: OIDC_CLIENT_ID
      valueFrom:
        secretKeyRef:
          key: client_id
          name: vault-oidc-creds
          optional: true
    - name: OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          key: client_secret
          name: vault-oidc-creds
          optional: true
    - name: PG_ROOT_USER
      valueFrom:
        secretKeyRef:
          name: pg-vault-superuser
          key: username
    - name: PG_ROOT_PASS
      valueFrom:
        secretKeyRef:
          name: pg-vault-superuser
          key: password
  externalConfig:
    auth:
      - roles:
          - bound_service_account_names:
              - '*'
            bound_service_account_namespaces:
              - '*'
            name: default
            policies:
              - allow_secrets
              - allow_pki
              - allow_database
            ttl: 1h
          - bound_service_account_names:
              - vault-secrets-webhook
            bound_service_account_namespaces:
              - vault
            name: secretsmutation
            policies:
              - allow_secrets
            ttl: 1h
        type: kubernetes
      - roles:
          - name: default
            policies: allow_secrets
            secret_id_num_uses: 40
            secret_id_ttl: 10m
            token_max_ttl: 30m
            token_num_uses: 10
            token_ttl: 20m
        type: approle
    group-aliases:
      - group: admin1
        mountpath: token
        name: admin1
    groups:
      - metadata:
          privileged: true
        name: admin1
        policies:
          - allow_secrets
        type: external
      - metadata:
          privileged: true
        name: admin2
        policies:
          - allow_secrets
        type: external
    policies:
      - name: allow_secrets
        rules: path "secret/*" { capabilities = ["create", "read", "update", "delete", "list"] }
      - name: allow_pki
        rules: path "pki/*" { capabilities = ["create", "read", "update", "delete", "list"] }
      - name: allow_database
        rules: |
          path "database/creds/*" {
            capabilities = ["read"]
          }
          path "database/static-creds/*" {
            capabilities = ["read"]
          }
          path "sys/leases/renew" {
            capabilities = ["update"]
          }
          path "sys/leases/revoke" {
            capabilities = ["update"]
          }
    secrets:
      - description: General secrets.
        options:
          version: 2
        path: secret
        type: kv
      - config:
          default_lease_ttl: 168h
          max_lease_ttl: 720h
        configuration:
          config:
            - crl_distribution_points: https://vault.vault:8200/v1/pki/crl
              issuing_certificates: https://vault.vault:8200/v1/pki/ca
              name: urls
          roles:
            - allow_subdomains: true
              allowed_domains: localhost,pod,svc,default,grafana,vault,authentik
              generate_lease: true
              name: default
              ttl: 1m
        description: Vault PKI Backend
        type: pki
      - type: database
        path: database
        description: PostgreSQL dynamic credentials
        configuration:
          config:
            - name: pg-default
              plugin_name: postgresql-database-plugin
              allowed_roles:
                - init-role
                - game-fetcher-role
                - settings-server-role
                - atuin-role
                - vaultwarden-role
                - zealot-role
                - zitadel-role
                - forgejo-role
                - coder-role
                - litellm-role
                - keto-role
                - temporal-role
                - mautrix-discord-role
                - mautrix-whatsapp-role
                - mautrix-telegram-role
                - synapse-role
                - mas-role
              connection_url: postgresql://{{username}}:{{password}}@pg-default-rw.db.svc.cluster.local:5432/postgres?sslmode=disable
              username: $${env `PG_ROOT_USER`}
              password: $${env `PG_ROOT_PASS`}
              root_rotation_statements:
                - ALTER USER "{{name}}" WITH PASSWORD '{{password}}'
          roles:
            # Least-privilege init role: CREATEDB only, short TTL
            - name: init-role
              db_name: pg-default
              creation_statements:
                - CREATE ROLE "{{name}}" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}' CREATEDB;
              revocation_statements:
                - DROP ROLE IF EXISTS "{{name}}";
              renew_statements:
                - ALTER ROLE "{{name}}" VALID UNTIL '{{expiration}}';
              default_ttl: 10m
              max_ttl: 15m
            # Per-app dynamic roles — each login user inherits from its group role (NOLOGIN)
            - name: game-fetcher-role
              db_name: pg-default
              creation_statements:
                - CREATE ROLE "{{name}}" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}' IN ROLE game_fetcher_grp;
              revocation_statements:
                - DROP ROLE IF EXISTS "{{name}}";
              renew_statements:
                - ALTER ROLE "{{name}}" VALID UNTIL '{{expiration}}';
              default_ttl: 24h
              max_ttl: 72h
            - name: settings-server-role
              db_name: pg-default
              creation_statements:
                - CREATE ROLE "{{name}}" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}' IN ROLE settings_server_grp;
              revocation_statements:
                - DROP ROLE IF EXISTS "{{name}}";
              renew_statements:
                - ALTER ROLE "{{name}}" VALID UNTIL '{{expiration}}';
              default_ttl: 24h
              max_ttl: 72h
            - name: atuin-role

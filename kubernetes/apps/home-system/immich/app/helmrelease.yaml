---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  chart:
    spec:
      chart: immich
      version: 0.9.0
      sourceRef:
        kind: HelmRepository
        name: immich-charts
  interval: 1h
  values:
    podAnnotations:
      reloader.stakater.com/auto: "true"
      vault.security.banzaicloud.io/vault-role: "default"
    image:
      tag: v1.133.0
    immich:
      persistence:
        library:
          existingClaim: immich-library
    env:
      REDIS_HOSTNAME: dragonfly.db.svc.cluster.local
      DB_DATABASE_NAME: immich
      DB_HOSTNAME: pg-vector-rw.db.svc.cluster.local
      DB_USERNAME: postgres
      DB_PASSWORD: vault:secret/data/pg_default#PASSWORD
      DB_PORT: "5432"
      DB_VECTOR_EXTENSION: vectorchord
      LOG_LEVEL: log
    server:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 2Gi
      ingress:
        main:
          enabled: false
      route:
        main:
          annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/name: Immich
            gethomepage.dev/description: Photo Management
            gethomepage.dev/group: Home
            gethomepage.dev/icon: immich.png
          hostnames:
            - "{{ .Release.Name }}.${DOMAIN1}"
          parentRefs:
            - name: envoy-internal
              namespace: network
    microservices:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 2Gi
    machine-learning:
      enabled: false
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 4Gi
    postgresql:
      enabled: false
    redis:
      enabled: false
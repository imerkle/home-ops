apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: wan-net
spec:
  config: '{
      "cniVersion": "0.3.1",
      "name": "wan-net",
      "type": "bridge",
      "bridge": "${OPENWRT_WAN_LINK}",
      "promiscMode": true,
      "ipam": {}
    }'

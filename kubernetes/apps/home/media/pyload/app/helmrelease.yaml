---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pyload
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      pyload:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/pyload-ng
              tag: latest
            env:
              TZ: America/New_York
              PUID: 1000
              PGID: 1000
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: pyload
        ports:
          http:
            port: 8000
    route:
      app:
        labels:
          enabled-oidc: "true"
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Pyload
          gethomepage.dev/description: Download Manager
          gethomepage.dev/group: Media
          gethomepage.dev/icon: pyload.png
        hostnames:
          - "{{ .Release.Name }}.${DOMAIN1}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
      downloads:
        existingClaim: copyparty-hdd
        globalMounts:
          - path: /downloads
            subPath: downloads
      scripts:
        type: configMap
        name: pyload-scripts
        defaultMode: 0775
        globalMounts:
          - path: /config/scripts/package_deleted/delete_files.sh
            subPath: delete_files.sh

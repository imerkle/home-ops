---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      forgejo-runner:
        annotations:
          reloader.stakater.com/auto: "true"
          vault.security.banzaicloud.io/vault-role: "default"
        containers:
          app:
            image:
              repository: code.forgejo.org/forgejo/runner
              tag: 12
            env:
              FORGEJO_INSTANCE_URL: "http://forgejo.dev-system.svc.cluster.local:3000"
              FORGEJO_RUNNER_SECRET: "vault:secret/data/forgejo#TOKEN"
              DOCKER_HOST: "unix:///socket/docker.sock"
            command:
              - /bin/sh
              - -c
              - |
                # Wait for Docker socket to be ready
                echo "Waiting for Docker daemon to be ready at /socket/docker.sock..."
                while [ ! -S /socket/docker.sock ]; do
                  sleep 2
                done

                # Always regenerate config to ensure options stay current
                echo "Generating config..."
                forgejo-runner generate-config > /data/config.yaml
                # Point Docker daemon at the shared DinD socket
                sed -i 's|docker_host: "-"|docker_host: "unix:///socket/docker.sock"|g' /data/config.yaml
                # Mount the DinD socket into job containers so workflow steps
                # that use docker/login-action, docker/build-push-action etc. work
                sed -i 's|options: ""|options: "-v /socket/docker.sock:/var/run/docker.sock"|g' /data/config.yaml

                if [ ! -f /data/.runner ]; then
                  echo "Registering runner..."
                  forgejo-runner register \
                    --instance "$FORGEJO_INSTANCE_URL" \
                    --token "$FORGEJO_RUNNER_SECRET" \
                    --name "forgejo-runner-k8s" \
                    --labels "ubuntu-latest:docker://catthehacker/ubuntu:act-22.04" \
                    --no-interactive
                fi

                echo "Starting runner..."
                forgejo-runner daemon --config /data/config.yaml
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Mi
          dind:
            image:
              repository: docker
              tag: 24-dind
            env:
              DOCKER_TLS_CERTDIR: ""
            args:
              - dockerd
              - --host=unix:///socket/docker.sock
              - --group=0
              # Treat ghcr.io as insecure so Docker skips TLS validation
              # (ghcr.io resolves to our local nginx proxy via hostAliases)
              - --insecure-registry=ghcr.io
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
          # Transparent HTTPS proxy: intercepts ghcr.io traffic (via hostAliases
          # pointing ghcr.io → 127.0.0.1) and forwards it to Zot, rewriting the
          # OCI API path so images land under /ghcr.io/<org>/<image> in Zot.
          ghcr-proxy:
            image:
              repository: nginx
              tag: alpine
            command:
              - /bin/sh
              - -c
              - |
                apk add --no-cache openssl > /dev/null 2>&1

                # Self-signed cert for ghcr.io — Docker uses --insecure-registry
                # so cert validation is skipped; the cert only satisfies the TLS handshake.
                openssl req -x509 -newkey rsa:2048 \
                  -keyout /tmp/key.pem -out /tmp/cert.pem \
                  -days 3650 -nodes \
                  -subj '/CN=ghcr.io' \
                  -addext 'subjectAltName=DNS:ghcr.io' 2>/dev/null

                cat > /tmp/nginx.conf << 'EOF'
                worker_processes 1;
                events { worker_connections 256; }
                http {
                  # Required for large image layers
                  client_max_body_size 0;
                  chunked_transfer_encoding on;

                  server {
                    listen 443 ssl;
                    server_name ghcr.io;

                    ssl_certificate     /tmp/cert.pem;
                    ssl_certificate_key /tmp/key.pem;

                    # OCI ping — pass through unchanged
                    location = /v2/ {
                      proxy_pass http://zot.dev-system.svc.cluster.local:5000;
                      proxy_set_header Host $host;
                      proxy_read_timeout 900;
                      proxy_send_timeout 900;
                    }

                    # OCI API — rewrite /v2/<name>/... → /v2/ghcr.io/<name>/...
                    # so images are stored under the ghcr.io namespace in Zot,
                    # matching the existing sync mirror structure.
                    location ~ ^/v2/(.+)$ {
                      rewrite ^/v2/(.+)$ /v2/ghcr.io/$1 break;
                      proxy_pass http://zot.dev-system.svc.cluster.local:5000;
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto https;
                      proxy_read_timeout 900;
                      proxy_send_timeout 900;
                      proxy_buffering off;
                      proxy_request_buffering off;
                    }
                  }
                }
                EOF

                nginx -c /tmp/nginx.conf -g 'daemon off;'
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi

    defaultPodOptions:
      # Resolve ghcr.io to localhost so all containers in the pod
      # (including Docker daemon in dind) hit the ghcr-proxy sidecar.
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - "ghcr.io"

    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /data
      docker-socket:
        type: emptyDir
        globalMounts:
          - path: /socket

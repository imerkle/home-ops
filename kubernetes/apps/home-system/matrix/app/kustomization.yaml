---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - helmrelease.yaml
  - source.yaml
  - httproutes.yaml
  - netpol.yaml
  - secret.yaml
configMapGenerator:
  - name: mautrix-whatsapp-config
    files:
      - ./whatsapp/config.yaml
      - ./whatsapp/registration.yaml
      - ./whatsapp/doublepuppet.yaml
generatorOptions:
  disableNameSuffixHash: true

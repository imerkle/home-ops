---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app artifacthub-mcp
  namespace: flux-system
spec:
  targetNamespace: dev-system
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  interval: 1h
  retryInterval: 1m
  timeout: 5m
  path: ./kubernetes/apps/devops/ai/mcp/artifacthub-mcp/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: false

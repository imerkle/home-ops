---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./cronjob.yaml
  - ./job.yaml
configMapGenerator:
  - name: zot
    files:
      - ./resources/config.json
generatorOptions:
  disableNameSuffixHash: true

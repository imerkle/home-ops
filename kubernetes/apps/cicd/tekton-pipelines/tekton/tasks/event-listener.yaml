---
# EventListener: forgejo-webhook
# Listens for Forgejo push & branch-delete webhooks
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: forgejo-webhook
  labels:
    app.kubernetes.io/part-of: tekton-tasks
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
    - name: forgejo-push-trigger
      interceptors:
        - ref:
            name: "cel"
            kind: ClusterInterceptor
          params:
            - name: "filter"
              # Only trigger on push events to branches (not tags)
              value: >-
                body.ref.startsWith('refs/heads/')
            - name: "overlays"
              value:
                - key: truncated_sha
                  expression: "body.after.truncate(7)"
      bindings:
        - ref: forgejo-push
      template:
        ref: build-and-push

    - name: forgejo-delete-trigger
      interceptors:
        - ref:
            name: "cel"
            kind: ClusterInterceptor
          params:
            - name: "filter"
              # Only trigger on branch delete events (not tag deletes)
              value: >-
                header.match('X-Gitea-Event', 'delete') && body.ref_type == 'branch'
            - name: "overlays"
              value:
                # Sanitize: replace all '/' with '-' to form a valid preview name
                - key: sanitized_branch
                  expression: "body.ref.replace('/', '-')"
      bindings:
        - ref: forgejo-delete
      template:
        ref: cleanup-preview

  resources:
    kubernetesResource:
      spec:
        template:
          spec:
            serviceAccountName: tekton-triggers-sa
            containers:
              - resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    memory: 128Mi

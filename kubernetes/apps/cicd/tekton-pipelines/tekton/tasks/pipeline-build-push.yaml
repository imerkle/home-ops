---
# Tekton Pipeline: build-and-push
# Full CI pipeline: git clone → kaniko build → push to Zot registry
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-push
  labels:
    app.kubernetes.io/part-of: tekton-tasks
spec:
  description: >-
    Clones a Forgejo repo, builds a Docker image with Kaniko,
    and pushes it to the Zot registry.
  params:
    - name: repo-url
      description: The git repository URL.
      type: string
    - name: revision
      description: The git revision to build.
      type: string
      default: main
    - name: image
      description: Full image reference including registry (e.g., zot.example.com/apps/myapp:sha).
      type: string
    - name: image-latest
      description: Additional image reference for the latest tag (e.g., zot.example.com/apps/myapp:latest).
      type: string
      default: ""
    - name: base-image
      description: The base image repository (e.g., zot.../myapp).
      type: string
    - name: git-ref
      description: The git reference (e.g., refs/heads/main).
      type: string
      default: refs/heads/main
    - name: repo-name
      description: Repository/app name for preview deployment (e.g. game-fetcher).
      type: string
    - name: home-ops-url
      description: SSH URL of the home-ops GitHub repository.
      type: string
      default: git@github.com:imerkle/home-ops.git
    - name: sanitized-branch
      description: >-
        Pre-sanitized branch name (refs/heads/ stripped, / replaced with -).
        Passed in from the trigger so finally tasks can use it without
        depending on task results (which are unavailable in finally).
      type: string
      default: main
    - name: dockerfile
      description: Path to the Dockerfile relative to repo root.
      type: string
      default: ./Dockerfile
    - name: context
      description: Build context directory relative to repo root.
      type: string
      default: ./
    - name: extra-args
      description: Extra arguments to pass to Kaniko.
      type: array
      default: ["--insecure", "--skip-tls-verify"]
    - name: protocol
      description: Protocol to use for the image URL (http or https).
      type: string
      default: http
  workspaces:
    - name: shared-workspace
      description: Workspace shared between git-clone and kaniko-build tasks.
    - name: dockerconfig
      description: Docker config for registry authentication.
      optional: true
    - name: ssh-credentials
      description: SSH key for pushing preview manifests to home-ops on GitHub.
  tasks:
    - name: prepare
      taskSpec:
        results:
          - name: branch-image
          - name: branch
        params:
          - name: ref
            type: string
          - name: base-image
            type: string
        steps:
          - name: sanitize
            image: docker.io/library/alpine:3.18
            script: |
              BRANCH=$(echo "$(params.ref)" | sed 's|^refs/heads/||' | sed 's|/|-|g')
              echo -n "$(params.base-image):$BRANCH" > $(results.branch-image.path)
              echo -n "$BRANCH" > $(results.branch.path)
      params:
        - name: ref
          value: $(params.git-ref)
        - name: base-image
          value: $(params.base-image)
    - name: fetch-source
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
    - name: build-push
      runAfter:
        - fetch-source
        - prepare
      taskRef:
        name: kaniko-build
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: IMAGE
          value: $(params.image)
        - name: DOCKERFILE
          value: $(params.dockerfile)
        - name: CONTEXT
          value: $(params.context)
        - name: EXTRA_ARGS
          value:
            - --destination=$(params.image-latest)
            - --destination=$(tasks.prepare.results.branch-image)
            - $(params.extra-args[*])
        - name: PROTOCOL
          value: $(params.protocol)
  results:
    - name: image-digest
      description: The digest of the built image.
      value: $(tasks.build-push.results.IMAGE_DIGEST)
    - name: image-url
      description: The URL of the built image.
      value: $(tasks.build-push.results.IMAGE_URL)
    - name: commit-sha
      description: The exact commit SHA that was built.
      value: $(tasks.fetch-source.results.commit)
  finally:
    - name: deploy-preview
      # Only deploy previews for non-main/master branches
      when:
        - input: $(params.git-ref)
          operator: notin
          values:
            - refs/heads/main
            - refs/heads/master
      taskRef:
        name: deploy-preview
      workspaces:
        - name: ssh-credentials
          workspace: ssh-credentials
      params:
        - name: repo-name
          value: $(params.repo-name)
        - name: branch
          value: $(params.sanitized-branch)
        - name: home-ops-url
          value: $(params.home-ops-url)

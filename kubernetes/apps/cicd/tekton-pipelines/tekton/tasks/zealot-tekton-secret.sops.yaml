#
# HOW TO USE:
#   1. Fill in the real values below (get token from Zealot → Settings → Personal tokens)
#   2. Encrypt with SOPS before committing:
#      sops --encrypt --age age1yvl77vcj6cthafxqnjezrme4ntktjgd2j4xpgkcfutws83zrtdesk93cll \
#           --encrypted-regex '^(data|stringData)$' \
#           --in-place zealot-tekton-secret.sops.yaml
#   3. Commit the encrypted file — NEVER commit the plaintext.
#
# The channel_key is OPTIONAL. Leave it empty ("") and Zealot will create
# a new app automatically on first upload.

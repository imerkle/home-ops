---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: goldilocks-vault-access
rules:
  - apiGroups:
      - vault.banzaicloud.com
    resources:
      - vaults
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: goldilocks-vault-access
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: goldilocks-vault-access
subjects:
  - kind: ServiceAccount
    name: goldilocks-controller
    namespace: observability

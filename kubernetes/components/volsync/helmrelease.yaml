---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}-volsync
spec:
  interval: 1h
  chart:
    spec:
      chart: ./charts/volsync
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 1h
  values:
    app: ${APP}
    defaults:
      schedule: "0 * * * *"
      accessModes:
        - ${VOLSYNC_ACCESSMODES:=ReadWriteOnce}
      sourceAccessModes:
        - ${VOLSYNC_SNAP_ACCESSMODES:=ReadWriteOnce}
      cacheAccessModes:
        - ${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}
      storageClassName: ${VOLSYNC_STORAGECLASS:=${STORE1}}
      cacheStorageClassName: ${VOLSYNC_CACHE_SNAPSHOTCLASS:=${STORE1}}
      snapshotClassName: ${VOLSYNC_SNAPSHOTCLASS:=csi-ceph-blockpool}
      runAsUser: ${VOLSYNC_PUID:=1000}
      runAsGroup: ${VOLSYNC_PGID:=1000}
      fsGroup: ${VOLSYNC_PGID:=1000}
      secretData:
        KOPIA_FS_PATH: /repository
        KOPIA_PASSWORD: "vault:secret/data/volsync#RESTIC_PASSWORD"
        KOPIA_S3_BUCKET: "${APP}-volsync"
        KOPIA_REPOSITORY: s3:http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc:80/${APP}-volsync
        KOPIA_S3_ENDPOINT: rook-ceph-rgw-ceph-objectstore.rook-ceph.svc:80
        AWS_S3_ENDPOINT: rook-ceph-rgw-ceph-objectstore.rook-ceph.svc:80
        KOPIA_S3_DISABLE_TLS: "true"
        AWS_S3_DISABLE_TLS: "true"
      offsite:
        enabled: ${VOLSYNC_OFFSITE_ENABLED:=true}
        schedule: "${VOLSYNC_OFFSITE_SCHEDULE:=30 * * * *}"
        repositorySecretName: "${VOLSYNC_OFFSITE_SECRET_NAME:=${APP}-volsync-offsite}"
        secretData:
          KOPIA_S3_BUCKET: "${VOLSYNC_OFFSITE_BUCKET:=homeops-volsync}"
          KOPIA_REPOSITORY: "${VOLSYNC_OFFSITE_REPOSITORY:=s3:https://${VOLSYNC_OFFSITE_ENDPOINT:=s3.us-west-002.backblazeb2.com}/${APP}}"
          KOPIA_S3_ENDPOINT: "${VOLSYNC_OFFSITE_ENDPOINT:=s3.us-west-002.backblazeb2.com}"
          AWS_S3_ENDPOINT: "${VOLSYNC_OFFSITE_ENDPOINT:=s3.us-west-002.backblazeb2.com}"
          KOPIA_S3_DISABLE_TLS: "${VOLSYNC_OFFSITE_DISABLE_TLS:=false}"
          AWS_S3_DISABLE_TLS: "${VOLSYNC_OFFSITE_DISABLE_TLS:=false}"
  valuesFrom:
    - kind: ConfigMap
      name: ${APP}-volsync-defaults
      valuesKey: values.yaml
    - kind: Secret
      name: ${APP}-volsync
      valuesKey: AWS_ACCESS_KEY_ID
      targetPath: defaults.secretData.AWS_ACCESS_KEY_ID
    - kind: Secret
      name: ${APP}-volsync
      valuesKey: AWS_SECRET_ACCESS_KEY
      targetPath: defaults.secretData.AWS_SECRET_ACCESS_KEY
    - kind: Secret
      name: ${VOLSYNC_OFFSITE_SECRET_NAME:=${APP}-volsync-offsite}
      valuesKey: AWS_ACCESS_KEY_ID
      targetPath: defaults.offsite.secretData.AWS_ACCESS_KEY_ID
      optional: true
    - kind: Secret
      name: ${VOLSYNC_OFFSITE_SECRET_NAME:=${APP}-volsync-offsite}
      valuesKey: AWS_SECRET_ACCESS_KEY
      targetPath: defaults.offsite.secretData.AWS_SECRET_ACCESS_KEY
      optional: true
    - kind: Secret
      name: ${VOLSYNC_OFFSITE_SECRET_NAME:=${APP}-volsync-offsite}
      valuesKey: KOPIA_PASSWORD
      targetPath: defaults.offsite.secretData.KOPIA_PASSWORD
      optional: true
    - kind: ConfigMap
      name: ${APP}-volsync-values
      valuesKey: values.yaml
      optional: true

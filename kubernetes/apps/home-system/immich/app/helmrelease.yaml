---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      immich:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
          vault.security.banzaicloud.io/vault-role: "default"
        initContainers:
          init-storage:
            image:
              repository: busybox
              tag: "1.36"
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                mkdir -p \
                  /usr/src/app/upload/upload \
                  /usr/src/app/upload/thumbs \
                  /usr/src/app/upload/backups \
                  /usr/src/app/upload/library \
                  /usr/src/app/upload/profile \
                  /usr/src/app/upload/encoded-video
                : > /usr/src/app/upload/.immich
                for dir in upload thumbs backups library profile encoded-video; do
                  : > "/usr/src/app/upload/${dir}/.immich"
                done
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.5.6
            env:
              REDIS_HOSTNAME: dragonfly.db.svc.cluster.local
              DB_DATABASE_NAME: immich
              DB_HOSTNAME: pg-vector-rw.db.svc.cluster.local
              DB_USERNAME: postgres
              DB_PASSWORD: vault:secret/data/pg_default#PASSWORD
              DB_PORT: "5432"
              DB_VECTOR_EXTENSION: vectorchord
              LOG_LEVEL: log
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
    service:
      app:
        controller: immich
        ports:
          http:
            port: 2283
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Immich
          gethomepage.dev/description: Photo Management
          gethomepage.dev/group: Home
          gethomepage.dev/icon: immich.png
        hostnames:
          - "{{ .Release.Name }}.${DOMAIN1}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      library:
        existingClaim: syncthing-data
        globalMounts:
          - path: /usr/src/app/upload
            subPath: immich

---
apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: kubevirt
spec:
  certificateRotateStrategy: {}
  configuration:
    architectureConfiguration:
      amd64:
        machineType: q35
        emulatedMachines:
          - q35*
          - pc-q35*
          - pc*
    developerConfiguration:
      featureGates:
        - CPUManager
        - SupportContainerProcesses
    cpuModel: "host-passthrough"
    imagePullPolicy: IfNotPresent
  customizeComponents: {}
  imagePullPolicy: IfNotPresent
  workloadUpdateStrategy: {}

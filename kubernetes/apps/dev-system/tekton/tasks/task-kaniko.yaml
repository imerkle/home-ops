---
# Tekton Task: kaniko-build
# Builds and pushes a container image using Kaniko (rootless, no Docker daemon)
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kaniko-build
  labels:
    app.kubernetes.io/part-of: tekton-tasks
spec:
  description: >-
    Builds and pushes a container image using Google's Kaniko tool.
    Kaniko doesn't depend on a Docker daemon and executes each command
    within a Dockerfile completely in userspace.
  workspaces:
    - name: source
      description: Workspace containing the Dockerfile and build context.
    - name: dockerconfig
      description: >-
        An optional workspace containing a .docker/config.json for registry auth.
        Mounted to /kaniko/.docker/config.json
      optional: true
  params:
    - name: IMAGE
      description: Name (reference) of the image to build.
      type: string
    - name: DOCKERFILE
      description: Path to the Dockerfile to build.
      type: string
      default: ./Dockerfile
    - name: CONTEXT
      description: The build context used by Kaniko.
      type: string
      default: ./
    - name: EXTRA_ARGS
      description: Extra arguments to pass to Kaniko.
      type: array
      default: []
    - name: BUILDER_IMAGE
      description: The Kaniko executor image to use.
      type: string
      default: gcr.io/kaniko-project/executor:v1.23.2
  results:
    - name: IMAGE_DIGEST
      description: Digest of the image just built.
    - name: IMAGE_URL
      description: URL of the image just built.
  steps:
    - name: build-and-push
      image: $(params.BUILDER_IMAGE)
      args:
        - --dockerfile=$(params.DOCKERFILE)
        - --context=$(workspaces.source.path)/$(params.CONTEXT)
        - --destination=$(params.IMAGE)
        - --digest-file=$(results.IMAGE_DIGEST.path)
        - --skip-tls-verify
        - $(params.EXTRA_ARGS[*])
      securityContext:
        runAsUser: 0
      volumeMounts:
        - name: kaniko-config
          mountPath: /kaniko/.docker/
  sidecars: []
  volumes:
    - name: kaniko-config
      projected:
        sources:
          - secret:
              name: zot-registry-auth
              items:
                - key: .dockerconfigjson
                  path: config.json
              optional: true

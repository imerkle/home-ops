---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: tempo-distributed
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    tempo:
      structuredConfig:
        ingester:
          lifecycler:
            ring:
              replication_factor: 1
        metrics_generator:
          ring:
            kvstore:
              store: memberlist
          processor:
            service_graphs: {}
            span_metrics: {}
          storage:
            remote_write:
              - url: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write
                send_exemplars: true

    traces:
      otlp:
        grpc:
          enabled: true
        http:
          enabled: true

    storage:
      trace:
        backend: s3
        s3:
          insecure: true
          # Bucket, endpoint, and credentials injected via valuesFrom below

    distributor:
      replicas: 1
    ingester:
      replicas: 1
      persistence:
        enabled: true
        storageClass: ceph-block
        size: 10Gi
    compactor:
      enabled: true
    querier:
      replicas: 1
    queryFrontend:
      replicas: 1
    gateway:
      enabled: true
      replicas: 1
    metricsGenerator:
      enabled: true
      replicas: 1
    serviceMonitor:
      enabled: true

  valuesFrom:
    - targetPath: storage.trace.s3.bucket
      kind: ConfigMap
      name: tempo-bucket
      valuesKey: BUCKET_NAME
    - targetPath: storage.trace.s3.endpoint
      kind: ConfigMap
      name: tempo-bucket
      valuesKey: BUCKET_HOST
    - targetPath: storage.trace.s3.access_key
      kind: Secret
      name: tempo-bucket
      valuesKey: AWS_ACCESS_KEY_ID
    - targetPath: storage.trace.s3.secret_key
      kind: Secret
      name: tempo-bucket
      valuesKey: AWS_SECRET_ACCESS_KEY

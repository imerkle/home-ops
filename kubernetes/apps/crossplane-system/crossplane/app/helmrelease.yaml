---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crossplane
  namespace: crossplane-system
spec:
  interval: 30m
  chart:
    spec:
      chart: crossplane
      version: 1.15.2
      sourceRef:
        kind: HelmRepository
        name: crossplane
        namespace: crossplane-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    args:
      - "--enable-composition-functions"
    provider:
      packages: []

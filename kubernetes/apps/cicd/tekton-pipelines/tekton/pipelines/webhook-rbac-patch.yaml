---
# Patch: Allow tekton-pipelines-webhook to access the dev-system namespace.
# The upstream Helm chart hardcodes resourceNames: [tekton-pipelines] for namespace
# access, but we install into dev-system, so the webhook can't read its own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tekton-pipelines-webhook-dev-system-ns
  labels:
    app.kubernetes.io/component: webhook
    app.kubernetes.io/part-of: tekton-pipelines
rules:
  - apiGroups:
      - ""
    resourceNames:
      - dev-system
    resources:
      - namespaces
    verbs:
      - get
  - apiGroups:
      - ""
    resourceNames:
      - dev-system
    resources:
      - namespaces/finalizers
    verbs:
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-pipelines-webhook-dev-system-ns
  labels:
    app.kubernetes.io/component: webhook
    app.kubernetes.io/part-of: tekton-pipelines
subjects:
  - kind: ServiceAccount
    name: tekton-pipelines-webhook
    namespace: dev-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-pipelines-webhook-dev-system-ns

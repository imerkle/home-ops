---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      qbittorrent:
        annotations:
          reloader.stakater.com/auto: "true"
          vault.security.banzaicloud.io/vault-role: "default"
        initContainers:
          init-config:
            image:
              repository: ghcr.io/onedr0p/qbittorrent
              tag: 4.6.4
            command:
              - /usr/bin/python3
              - -c
              - |
                import configparser
                import os

                conf_file = "/config/qBittorrent/qBittorrent.conf"
                os.makedirs(os.path.dirname(conf_file), exist_ok=True)

                config = configparser.ConfigParser(interpolation=None)
                config.optionxform = str # Preserve case

                if os.path.exists(conf_file):
                    config.read(conf_file)

                if 'Preferences' not in config:
                    config['Preferences'] = {}

                username = os.environ.get('QBIT_USERNAME')
                password = os.environ.get('QBIT_PASSWORD')

                if username:
                    config['Preferences']['WebUI\\Username'] = username
                if password:
                    config['Preferences']['WebUI\\Password_PBKDF2'] = password

                with open(conf_file, 'w') as f:
                    config.write(f, space_around_delimiters=False)

                print(f"Configuration updated in {conf_file}")
            env:
              QBIT_USERNAME: "vault:secret/data/qbittorrent#USERNAME"
              QBIT_PASSWORD: "vault:secret/data/qbittorrent#PASSWORD"
        pod:          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
        containers:
          app:
            image:
              repository: ghcr.io/onedr0p/qbittorrent
              tag: 4.6.4
            env:
              TZ: America/New_York
              QBITTORRENT__PORT: &port 8080
              QBITTORRENT__BT_PORT: 50413
              # Required for vault injector to provide secrets to this container too if needed
              QBIT_USERNAME: "vault:secret/data/qbittorrent#USERNAME"
              QBIT_PASSWORD: "vault:secret/data/qbittorrent#PASSWORD"
            resources:
              requests:
                cpu: 10m
                memory: 250Mi
              limits:
                memory: 2Gi
    service:
      app:
        controller: qbittorrent
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: qBittorrent
          gethomepage.dev/description: Torrent Client
          gethomepage.dev/group: Media
          gethomepage.dev/icon: qbittorrent.png
        hostnames:
          - "{{ .Release.Name }}.${DOMAIN1}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
      downloads:
        existingClaim: copyparty-hdd
        globalMounts:
          - path: /downloads
            subPath: qbittorrent

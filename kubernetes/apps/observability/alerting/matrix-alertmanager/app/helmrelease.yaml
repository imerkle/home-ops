---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matrix-alertmanager
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      matrix-alertmanager:
        annotations:
          reloader.stakater.com/auto: "true"
          vault.security.banzaicloud.io/vault-role: "default"
        containers:
          app:
            image:
              repository: jaywink/matrix-alertmanager
              tag: latest
            env:
              APP_PORT: &port 3000
              APP_ALERTMANAGER_SECRET: "vault:secret/data/matrix_alertmanager#SECRET"
              MATRIX_HOMESERVER_URL: "matrix.${DOMAIN1}"
              MATRIX_ROOMS: "vault:secret/data/matrix_alertmanager#ROOM_ID"
              MATRIX_TOKEN: "vault:secret/data/matrix_alertmanager#ACCESS_TOKEN"
              MATRIX_USER: "vault:secret/data/matrix_alertmanager#USER"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: matrix-alertmanager
        ports:
          http:
            port: *port

---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./appvaultpolicy.yaml
patches:
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: prowlarr-volsync
    patch: |-
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: prowlarr-volsync
        namespace: home-system
      spec:
        values:
          defaults:
            secretData:
              KOPIA_FS_PATH: /repository
              KOPIA_PASSWORD: "vault:secret/data/volsync#RESTIC_PASSWORD"
              KOPIA_S3_BUCKET: "homeops-volsync-67"
              KOPIA_REPOSITORY: "s3:https://${vault:secret/data/cloudflare#S3_ENDPOINT}/homeops-volsync-67/prowlarr"
              KOPIA_S3_ENDPOINT: "${vault:secret/data/cloudflare#S3_ENDPOINT}"
              AWS_S3_ENDPOINT: "${vault:secret/data/cloudflare#S3_ENDPOINT}"
              KOPIA_S3_DISABLE_TLS: "false"
              AWS_S3_DISABLE_TLS: "false"
        valuesFrom:
          - kind: ConfigMap
            name: prowlarr-volsync-defaults
            valuesKey: values.yaml
          - kind: Secret
            name: prowlarr-volsync-offsite
            valuesKey: AWS_ACCESS_KEY_ID
            targetPath: defaults.secretData.AWS_ACCESS_KEY_ID
          - kind: Secret
            name: prowlarr-volsync-offsite
            valuesKey: AWS_SECRET_ACCESS_KEY
            targetPath: defaults.secretData.AWS_SECRET_ACCESS_KEY

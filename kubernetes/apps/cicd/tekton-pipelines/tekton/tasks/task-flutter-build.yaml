---
# Tekton Task: flutter-build-android
# Clones the source (already on the shared workspace) and runs
# Fastlane to build a debug-signed APK and upload it to Zealot.
#
# Expects the workspace to contain:
#   /workspace/source/sms-vault/   ← the sms-vault repo
#   /workspace/source/rocket_ui/   ← the rocket_ui repo (sibling)
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: flutter-build-android
  labels:
    app.kubernetes.io/part-of: tekton-tasks
spec:
  description: >-
    Runs `fastlane android build_and_upload` inside the Flutter project
    directory, then uploads the resulting APK to Zealot via the
    fastlane-plugin-zealot action.
  params:
    - name: flutter-project-path
      description: Path to the Flutter project inside the workspace (relative to workspace root).
      type: string
      default: sms-vault/flutterui
    - name: commit-sha
      description: Short commit SHA used in the Zealot changelog.
      type: string
      default: unknown
    - name: branch
      description: Branch name used in the Zealot changelog.
      type: string
      default: main
    - name: builder-image
      description: >-
        Docker image that contains Flutter + Android SDK + Ruby + Fastlane.
        Defaults to the public mingc/android-build-box which has all prerequisites.
        Override with zot.dev-system.svc.cluster.local:5000/smsvault-android-builder:latest
        once that image has been built and pushed.
      type: string
      default: mingc/android-build-box:latest
  workspaces:
    - name: source
      description: Shared workspace containing both sms-vault and rocket_ui checkouts.
  results:
    - name: apk-path
      description: Absolute path to the built APK inside the workspace.
  steps:
    # ── Step 1: flutter pub get ───────────────────────────────────────────────
    - name: flutter-pub-get
      image: $(params.builder-image)
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)/$(params.flutter-project-path)
      env:
        - name: PUB_CACHE
          value: /workspace/.pub-cache
        - name: HOME
          value: /root
      script: |
        #!/bin/sh
        set -e
        echo "[flutter-pub-get] Running flutter pub get …"
        flutter pub get
        echo "[flutter-pub-get] Done."
    # ── Step 2: patch Gradle wrapper to use pre-installed Gradle ─────────────
    # mingc/android-build-box ships Gradle at /opt/gradle/gradle-X.Y
    # The flutter project's gradlew would otherwise try to download gradle-8.14
    # from GitHub (https://services.gradle.org/...) which may 504 from inside
    # the cluster. We redirect it to the local installation instead.
    - name: gradle-setup
      image: $(params.builder-image)
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)/$(params.flutter-project-path)
      env:
        - name: HOME
          value: /root
      script: |
        #!/bin/sh
        set -e

        WRAPPER="android/gradle/wrapper/gradle-wrapper.properties"

        # Find the installed Gradle version
        GRADLE_DIR=$(ls -d /opt/gradle/gradle-* 2>/dev/null | head -1)
        if [ -z "$GRADLE_DIR" ]; then
          echo "[gradle-setup] No pre-installed Gradle found at /opt/gradle, will rely on download."
          exit 0
        fi

        GRADLE_VERSION=$(basename "$GRADLE_DIR" | sed 's/gradle-//')
        echo "[gradle-setup] Found Gradle $GRADLE_VERSION at $GRADLE_DIR"

        # Rewrite distributionUrl to a file:// URI pointing at the local install
        # The zip lives alongside the expanded dir, or we create a symlink in GRADLE_USER_HOME
        GRADLE_USER_HOME=/root/.gradle
        DIST_DIR="$GRADLE_USER_HOME/wrapper/dists/gradle-${GRADLE_VERSION}-all/$(echo gradle-${GRADLE_VERSION}-all | md5sum | cut -d' ' -f1)"
        mkdir -p "$DIST_DIR"

        # Link the pre-installed dir so the wrapper sees it as already extracted
        if [ ! -d "$DIST_DIR/gradle-${GRADLE_VERSION}" ]; then
          ln -sf "$GRADLE_DIR" "$DIST_DIR/gradle-${GRADLE_VERSION}"
          echo "[gradle-setup] Linked $GRADLE_DIR → $DIST_DIR/gradle-${GRADLE_VERSION}"
        fi

        # Mark the distribution as ready (gradle wrapper checks for a .ok file)
        touch "$DIST_DIR/gradle-${GRADLE_VERSION}.ok"

        echo "[gradle-setup] Gradle $GRADLE_VERSION pre-configured. distributionUrl unchanged."
        echo "[gradle-setup] Done."

    - name: fastlane-build-upload
      image: $(params.builder-image)
      imagePullPolicy: IfNotPresent
      workingDir: $(workspaces.source.path)/$(params.flutter-project-path)
      env:
        - name: HOME
          value: /root
        - name: PUB_CACHE
          value: /workspace/.pub-cache
        - name: GIT_COMMIT_SHA
          value: $(params.commit-sha)
        - name: GIT_BRANCH
          value: $(params.branch)
        - name: GIT_CHANGELOG
          value: "Build $(params.commit-sha) on $(params.branch)"
        - name: GRADLE_USER_HOME
          value: /root/.gradle
        - name: ANDROID_SDK_ROOT
          value: /opt/android-sdk-linux
        - name: FLUTTER_SUPPRESS_ANALYTICS
          value: "true"
        # Zealot credentials — mounted from the secret workspace
        - name: ZEALOT_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: zealot-tekton-secret
              key: endpoint
        - name: ZEALOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: zealot-tekton-secret
              key: token
        - name: ZEALOT_ANDROID_CHANNEL_KEY
          valueFrom:
            secretKeyRef:
              name: zealot-tekton-secret
              key: android_channel_key
              optional: true
      script: |
        #!/bin/sh
        set -e
        echo "[fastlane] Installing gems …"
        bundle install --quiet

        echo "[fastlane] Running android build_and_upload lane …"
        bundle exec fastlane android build_and_upload

        APK="$(workspaces.source.path)/$(params.flutter-project-path)/build/app/outputs/flutter-apk/app-release.apk"
        echo -n "$APK" > $(results.apk-path.path)
        echo "[fastlane] APK result written: $APK"

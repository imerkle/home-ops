---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: temporal
  labels:
    security.banzaicloud.io/mutate: skip
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      temporal:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: "16.4"
            env:
              INIT_POSTGRES_DBNAME: "temporal"
              INIT_POSTGRES_HOST: "pg-default-rw.db.svc.cluster.local"
              INIT_POSTGRES_USER: "vault:database/creds/init-role#username"
              INIT_POSTGRES_PASS: "vault:database/creds/init-role#password"
              PGDATABASE: "postgres"
              INIT_POSTGRES_SUPER_USER: "vault:database/creds/init-role#username"
              INIT_POSTGRES_SUPER_PASS: "vault:database/creds/init-role#password"
          init-visibility-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: "16.4"
            env:
              INIT_POSTGRES_DBNAME: "temporal_visibility"
              INIT_POSTGRES_HOST: "pg-default-rw.db.svc.cluster.local"
              INIT_POSTGRES_USER: "vault:database/creds/init-role#username"
              INIT_POSTGRES_PASS: "vault:database/creds/init-role#password"
              PGDATABASE: "postgres"
              INIT_POSTGRES_SUPER_USER: "vault:database/creds/init-role#username"
              INIT_POSTGRES_SUPER_PASS: "vault:database/creds/init-role#password"
          init-db-grants:
            image:
              repository: ghcr.io/cloudnative-pg/postgresql
              tag: "15.2-11"
            command: ["/bin/sh", "-c"]
            args:
              - |
                until pg_isready -h pg-default-rw.db.svc.cluster.local -U "$SUPER_USER"; do sleep 2; done
                for DB in temporal temporal_visibility; do
                  psql "postgresql://$SUPER_USER:$SUPER_PASS@pg-default-rw.db.svc.cluster.local:5432/$DB" <<SQL
                    GRANT CONNECT ON DATABASE $DB TO PUBLIC;
                    GRANT ALL PRIVILEGES ON SCHEMA public TO PUBLIC;
                    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO PUBLIC;
                    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO PUBLIC;
                    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO PUBLIC;
                    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO PUBLIC;
                SQL
                done
            env:
              SUPER_USER: "vault:database/creds/init-role#username"
              SUPER_PASS: "vault:database/creds/init-role#password"
        containers:
          app:
            image:
              repository: temporalio/auto-setup
              tag: 1.24.2
            env:
              DB: postgres12
              DB_PORT: "5432"
              POSTGRES_USER: "vault:database/creds/app-role#username"
              POSTGRES_PWD: "vault:database/creds/app-role#password"
              POSTGRES_SEEDS: "pg-default-rw.db.svc.cluster.local"
              SKIP_DB_CREATE: "true"
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
          ui:
            image:
              repository: temporalio/ui
              tag: 2.27.0
            env:
              TEMPORAL_ADDRESS: "temporal:7233"
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: temporal
        ports:
          http:
            port: 8080
          grpc:
            port: 7233
    route:
      app:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - "temporal.${DOMAIN1}"
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Temporal
          gethomepage.dev/description: Workflow Orchestration
          gethomepage.dev/group: Development
        rules:
          - backendRefs:
              - port: 8080
                name: temporal

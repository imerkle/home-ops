apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mautrix-telegram
  labels:
    security.banzaicloud.io/mutate: skip
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      mautrix-telegram:
        labels:
          postgres: "true"
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          copy-config:
            image:
              repository: public.ecr.aws/docker/library/python
              tag: 3.11-alpine
            command: ["python3", "-c"]
            args:
              - |
                import os, shutil
                for f in os.listdir('/tmp/config'):
                    if not f.startswith('.'):
                        shutil.copy(os.path.join('/tmp/config', f), '/data')
                with open('/data/config.yaml', 'r') as f:
                    content = f.read()
                content = content.replace('${' + 'DB_USER}', os.environ['DB_USER'])
                content = content.replace('${' + 'DB_PASS}', os.environ['DB_PASS'])
                with open('/data/config.yaml', 'w') as f:
                    f.write(content)
            env:
              DB_USER:
                valueFrom:
                  secretKeyRef:
                    name: mautrix-telegram-db-creds
                    key: username
              DB_PASS:
                valueFrom:
                  secretKeyRef:
                    name: mautrix-telegram-db-creds
                    key: password
        containers:
          app:
            image:
              repository: dock.mau.dev/mautrix/telegram
              tag: v0.15.3
            command: ["python3", "-m", "mautrix_telegram"]
            args: [ "-c", "/data/config.yaml", "--no-update" ]
            workingDir: /data
            env:
              TZ: America/New_York
              DB_USER:
                valueFrom:
                  secretKeyRef:
                    name: mautrix-telegram-db-creds
                    key: username
              DB_PASS:
                valueFrom:
                  secretKeyRef:
                    name: mautrix-telegram-db-creds
                    key: password
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 29317
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 404"]
        hostnames:
          - "{{ .Release.Name }}.x3y.space"
        parentRefs:
          - name: envoy-internal
            namespace: networking
    persistence:
      config:
        type: configMap
        name: mautrix-telegram-config
        advancedMounts:
          mautrix-telegram:
            copy-config:
              - path: /tmp/config
      data:
        existingClaim: mautrix-telegram
        globalMounts:
          - path: /data
      tmpfs:
        type: emptyDir
        advancedMounts:
          mautrix-telegram:
            app:
              - path: /tmp
                subPath: tmp

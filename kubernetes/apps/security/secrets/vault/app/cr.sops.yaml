apiVersion: vault.banzaicloud.com/v1alpha1
kind: Vault
metadata:
    name: vault
spec:
    annotations:
        reloader.stakater.com/auto: "true"
    config:
        listener:
            tcp:
                address: '[::]:8200'
                cluster_address: '[::]:8201'
                tls_disable: true
        storage:
            file:
                path: /vault/file
        ui: true
    envsConfig:
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
                key: client_id
                name: vault-oidc-creds
                optional: true
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
                key: client_secret
                name: vault-oidc-creds
                optional: true
    externalConfig:
        auth:
            - roles:
                - bound_service_account_names:
                    - '*'
                  bound_service_account_namespaces:
                    - '*'
                  name: default
                  policies:
                    - allow_secrets
                    - allow_pki
                  ttl: 1h
                - bound_service_account_names:
                    - vault-secrets-webhook
                  bound_service_account_namespaces:
                    - vault
                  name: secretsmutation
                  policies:
                    - allow_secrets
                  ttl: 1h
              type: kubernetes
            - roles:
                - name: default
                  policies: allow_secrets
                  secret_id_num_uses: 40
                  secret_id_ttl: 10m
                  token_max_ttl: 30m
                  token_num_uses: 10
                  token_ttl: 20m
              type: approle
        group-aliases:
            - group: admin1
              mountpath: token
              name: admin1
        groups:
            - metadata:
                privileged: true
              name: admin1
              policies:
                - allow_secrets
              type: external
            - metadata:
                privileged: true
              name: admin2
              policies:
                - allow_secrets
              type: external
        policies:
            - name: allow_secrets
              rules: path "secret/*" { capabilities = ["create", "read", "update", "delete", "list"] }
            - name: allow_pki
              rules: path "pki/*" { capabilities = ["create", "read", "update", "delete", "list"] }
        secrets:
            - description: General secrets.
              options:
                version: 2
              path: secret
              type: kv
            - config:
                default_lease_ttl: 168h
                max_lease_ttl: 720h
              configuration:
                config:
                    - crl_distribution_points: https://vault.vault:8200/v1/pki/crl
                      issuing_certificates: https://vault.vault:8200/v1/pki/ca
                      name: urls
                roles:
                    - allow_subdomains: true
                      allowed_domains: localhost,pod,svc,default,grafana,vault,authentik
                      generate_lease: true
                      name: default
                      ttl: 1m
              description: Vault PKI Backend
              type: pki
        startupSecrets:

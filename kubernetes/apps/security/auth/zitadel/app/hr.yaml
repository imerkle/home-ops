apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zitadel
spec:
  chart:
    spec:
      chart: zitadel
      version: "9.13.0"
      sourceRef:
        kind: HelmRepository
        name: zitadel
        namespace: zitadel
  values:
    env:
      - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS
        value: admin@admin.com
      - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD
        value: RootPassword1!
        #new RootPassword1!!
    replicaCount: 1
    zitadel:
      masterkey: vault:secret/data/zitadel#MASTERKEY
      configmapConfig:
        ExternalDomain: &host "zitadel.${DOMAIN1}"
        ExternalSecure: false
        TLS:
          Enabled: false
        OIDCSettings:
          AccessTokenLifetime: 24h
          IdTokenLifetime: 24h
          RefreshTokenIdleExpiration: 720h
          RefreshTokenExpiration: 2160h
        LoginPolicy:
          PasswordCheckLifetime: 360h
          ExternalLoginCheckLifetime: 360h
          SecondFactorCheckLifetime: 100h
          MultiFactorCheckLifetime: 100h
      secretConfig:
        ExternalDomain: *host
        ExternalSecure: true
        ExternalPort: 443
        Database:
          postgres:
            Host: vault:secret/data/pg_default#HOST
            Port: 5432
            Database: zitadel
            MaxOpenConns: 40
            MaxIdleConns: 20
            MaxConnLifetime: 30m
            MaxConnIdleTime: 5m
            User:
              Username: vault:secret/data/pg_default#USER
              Password: vault:secret/data/pg_default#PASSWORD
              SSL:
                Mode: disable
            Admin:
              Username: vault:secret/data/pg_default#USER
              Password: vault:secret/data/pg_default#PASSWORD
              SSL:
                Mode: disable
        OIDC:
          AccessTokenLifetime: 24h
          IdTokenLifetime: 24h
          RefreshTokenIdleExpiration: 720h
          RefreshTokenExpiration: 2160h
        LoginPolicy:
          PasswordCheckLifetime: 360h
          ExternalLoginCheckLifetime: 360h
          SecondFactorCheckLifetime: 100h
          MultiFactorCheckLifetime: 100h

    ingress:
      enabled: false
      className: "internal"
      annotations: {}
      hosts:
        - host: *host
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - *host
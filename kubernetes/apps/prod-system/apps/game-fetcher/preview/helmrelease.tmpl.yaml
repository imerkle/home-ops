---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
# Preview template for game-fetcher branch deployments.
# Placeholders replaced by the deploy-preview Tekton task:
#   __BRANCH__  → sanitized branch name (e.g. "feature-cool")
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app game-fetcher-__BRANCH__
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      game-fetcher-__BRANCH__:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            vault.security.banzaicloud.io/vault-env-daemon: "true"
        containers:
          app:
            image:
              repository: zot.${DOMAIN1}/game-fetcher
              tag: __COMMIT_SHA__
            env:
              PORT: &port "3000"
              RAWG: "vault:secret/data/ext_services#RAWG"
              OIDC_CLIENT_ID: "vault:secret/data/ext_services#OIDC_CLIENT_ID"
              OIDC_CLIENT_SECRET: "vault:secret/data/ext_services#OIDC_CLIENT_SECRET"
              BASE_URL: "https://__BRANCH__-game-fetcher.${DOMAIN1}"
              SOURCES: '[{"name":"FitGirl Local","url":"file://sources/fitgirl.json"}, {"name":"Dodi Local","url":"file://sources/dodi.json"}, {"name":"Kazumi Local","url":"file://sources/kazumi.json"}, {"name":"Xatab Local","url":"file://sources/xatab.json"}]'
              INDEX_INTERVAL: "1h"
              OIDC_ISSUER: "https://zitadel.${DOMAIN1}"
              OIDC_REDIRECT_URL: "https://__BRANCH__-game-fetcher.${DOMAIN1}/auth/callback"
              OIDC_SESSION_KEY: "super-secret-session-key-change-me"
              DATABASE_URL: "postgres://$${vault:database/creds/app-role#username}:$${vault:database/creds/app-role#password}@pg-default-rw.db.svc.cluster.local:5432/gamefetcher?sslmode=disable"
              TEMPORAL_HOST: "temporal.dev-system.svc.cluster.local:7233"
              TEMPORAL_NAMESPACE: "default"
              TEMPORAL_TASK_QUEUE: "game-fetcher"
              QBITTORRENT_URL: "http://qbittorrent.home-system.svc.cluster.local:8080"
              QBITTORRENT_USERNAME: "admin"
              QBITTORRENT_PASSWORD: "adminadmin"
              JDOWNLOADER_URL: "http://jdownloader.home-system.svc.cluster.local:3128"
              MEILISEARCH_URL: "http://meilisearch.db.svc.cluster.local:7700"
              MEILISEARCH_API_KEY: "super-secret-master-key"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 300Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: game-fetcher-__BRANCH__
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "__BRANCH__-game-fetcher.${DOMAIN1}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - port: *port
                name: *app
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

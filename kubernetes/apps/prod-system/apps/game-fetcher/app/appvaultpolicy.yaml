apiVersion: home.arpa/v1alpha1
kind: AppVaultPolicy
metadata:
  name: game-fetcher-vault
  namespace: prod-system
spec:
  serviceAccount: game-fetcher
  policy: |
    path "secret/data/ext_services" {
      capabilities = ["read"]
    }
    path "secret/data/prowlarr" {
      capabilities = ["read"]
    }

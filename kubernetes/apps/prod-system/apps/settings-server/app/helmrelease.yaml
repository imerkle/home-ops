---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app settings-server
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 2
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      settings-server:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: zot.${DOMAIN1}/settings-server
              tag: main
            env:
              PORT: &port "3000"
              GRPC_PORT: &grpcPort "50051"
              DATABASE_URL: "postgres://$${vault:database/creds/settings-server-role#username}:$${vault:database/creds/settings-server-role#password}@pg-default-rw.db.svc.cluster.local:5432/settings_server?sslmode=disable"
              AUTH_SERVER_ADDR: "auth-server.prod-system:50051"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: settings-server
        ports:
          http:
            port: *port
          grpc:
            port: *grpcPort

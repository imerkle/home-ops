---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: email-fetcher
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      email-fetcher:
        annotations:
          vault.security.banzaicloud.io/vault-role: "default"
        containers:
          app:
            image:
              repository: public.ecr.aws/docker/library/python
              tag: 3.11-alpine
            command:
              - /bin/sh
              - -c
              - |
                pip install --no-cache-dir boto3 requests && \
                python -u /scripts/fetcher.py
            env:
              AWS_ACCESS_KEY_ID: "vault:secret/data/cloudflare#AWS_ACCESS_KEY_ID"
              AWS_SECRET_ACCESS_KEY: "vault:secret/data/cloudflare#AWS_SECRET_ACCESS_KEY"
              R2_ACCOUNT_ID: "vault:secret/data/cloudflare#ACCOUNT_ID"
              R2_BUCKET: "home-ops-email-inbox"
              AWS_DEFAULT_REGION: "auto"
              STALWART_URL: "http://stalwart-stalwart-mail.home-system.svc.cluster.local:80/.well-known/jmap"
              STALWART_TOKEN: "supersecret"
              STALWART_LOGIN_USER: "admin"
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    persistence:
      scripts:
        type: configMap
        name: email-fetcher-script
        globalMounts:
          - path: /scripts

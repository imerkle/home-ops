apiVersion: v1
kind: ConfigMap
metadata:
  name: rook-config-override
data:
  config: |
    [global]
    ms_type = simple
    ms_async_op_threads = 0
    ms_connection_ready_timeout = 10
    ms_connection_idle_timeout = 10
    rados_mon_op_timeout = 10
    rados_osd_op_timeout = 10
    client_mount_timeout = 10
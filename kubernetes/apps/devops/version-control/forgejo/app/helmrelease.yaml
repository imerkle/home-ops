---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      forgejo:
        annotations:
          reloader.stakater.com/auto: "true"
          vault.security.banzaicloud.io/vault-role: "default"
        initContainers:
          init-oidc:
            image:
              repository: codeberg.org/forgejo/forgejo
              tag: 9.0.3
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
            env:
              # Need the DB config so forgejo CLI can connect
              FORGEJO__database__DB_TYPE: postgres
              FORGEJO__database__HOST: "pg-default-rw.db.svc.cluster.local"
              FORGEJO__database__NAME: forgejo
              FORGEJO__database__USER: "$${vault:database/creds/forgejo-role#username}"
              FORGEJO__database__PASSWD: "$${vault:database/creds/forgejo-role#password}"
              FORGEJO__security__INSTALL_LOCK: "true"
              FORGEJO__server__OFFLINE_MODE: "true"
            command:
              - /bin/bash
              - -c
              - |
                echo "Configuring Forgejo OIDC..."
                CLIENT_ID="${client_id}"
                CLIENT_SECRET="${client_secret}"
                if forgejo admin auth list | grep -q "Ok8Sh"; then
                  ID=$(forgejo admin auth list | grep "Ok8Sh" | awk '{print $1}')
                  forgejo admin auth update-oauth --id "$ID" --name Ok8Sh \
                    --provider openidConnect \
                    --key "$CLIENT_ID" \
                    --secret "$CLIENT_SECRET" \
                    --auto-discover-url "https://zitadel.${DOMAIN1}/.well-known/openid-configuration" \
                    --scopes "openid email profile groups"
                else
                  forgejo admin auth add-oauth --name Ok8Sh \
                    --provider openidConnect \
                    --key "$CLIENT_ID" \
                    --secret "$CLIENT_SECRET" \
                    --auto-discover-url "https://zitadel.${DOMAIN1}/.well-known/openid-configuration" \
                    --scopes "openid email profile groups"
                fi
                echo "OIDC init done (client_id=${client_id})."
        containers:
          app:
            image:
              repository: codeberg.org/forgejo/forgejo
              tag: 9.0.3
            env:
              FORGEJO__actions__DEFAULT_ACTIONS_URL: "https://forgejo.${DOMAIN1}/"
              FORGEJO__database__DB_TYPE: postgres
              FORGEJO__database__HOST: "pg-default-rw.db.svc.cluster.local"
              FORGEJO__database__NAME: forgejo
              FORGEJO__database__USER: "$${vault:database/creds/forgejo-role#username}"
              FORGEJO__database__PASSWD: "$${vault:database/creds/forgejo-role#password}"
              FORGEJO__metrics__ENABLED: "true"
              FORGEJO__repository__ENABLE_PUSH_CREATE_USER: "true"
              FORGEJO__repository__ENABLE_PUSH_CREATE_ORG: "true"
              FORGEJO__security__INSTALL_LOCK: "true"
              FORGEJO__server__DOMAIN: "forgejo.${DOMAIN1}"
              FORGEJO__server__ROOT_URL: "https://forgejo.${DOMAIN1}/"
              FORGEJO__server__SSH_DOMAIN: "ssh.forgejo.${DOMAIN1}"
              FORGEJO__server__SSH_PORT: "22"
              FORGEJO__server__SSH_LISTEN_PORT: "2222"
              FORGEJO__webhook__ALLOWED_HOST_LIST: "*"
              FORGEJO__webhook__SKIP_TLS_VERIFY: "true"
              # OIDC
              OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: forgejo-oidc-creds
                    key: client_id
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: forgejo-oidc-creds
                    key: client_secret
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi

    service:
      app:
        controller: forgejo
        ports:
          http:
            port: 3000
          ssh:
            port: 22
    route:
      app:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - "forgejo.${DOMAIN1}"
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Forgejo
          gethomepage.dev/description: Self-hosted Git Service
          gethomepage.dev/group: Development
          gethomepage.dev/icon: forgejo.png
        rules:
          - backendRefs:
              - port: 3000
                name: forgejo
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data

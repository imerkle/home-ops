---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      forgejo-runner:
        annotations:
          reloader.stakater.com/auto: "true"
          vault.security.banzaicloud.io/vault-role: "default"
        containers:
          app:
            image:
              repository: code.forgejo.org/forgejo/runner
              tag: 12
            env:
              FORGEJO_INSTANCE_URL: "http://forgejo.dev-system.svc.cluster.local:3000"
              FORGEJO_RUNNER_SECRET: "vault:secret/data/forgejo#TOKEN"
              DOCKER_HOST: "unix:///socket/docker.sock"
            command:
              - /bin/sh
              - -c
              - |
                echo "Waiting for Docker daemon..."
                while [ ! -S /socket/docker.sock ]; do sleep 2; done

                # Always regenerate config to ensure options stay current
                forgejo-runner generate-config > /data/config.yaml
                sed -i 's|docker_host: "-"|docker_host: "unix:///socket/docker.sock"|g' /data/config.yaml
                # Mount DinD socket + certs dir into job containers.
                # The certs dir gives job containers access to our CA so
                # any docker CLI commands also trust the ghcr-proxy.
                sed -i 's|options: ""|options: "-v /socket/docker.sock:/var/run/docker.sock -v /etc/docker/certs.d:/etc/docker/certs.d:ro"|g' /data/config.yaml

                if [ ! -f /data/.runner ]; then
                  echo "Registering runner..."
                  forgejo-runner register \
                    --instance "$FORGEJO_INSTANCE_URL" \
                    --token "$FORGEJO_RUNNER_SECRET" \
                    --name "forgejo-runner-k8s" \
                    --labels "ubuntu-latest:docker://catthehacker/ubuntu:act-22.04" \
                    --no-interactive
                fi

                echo "Starting runner..."
                forgejo-runner daemon --config /data/config.yaml
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Mi

          dind:
            image:
              repository: docker
              tag: 24-dind
            env:
              DOCKER_TLS_CERTDIR: ""
            # Use shell so we can generate the CA cert before starting dockerd.
            # The CA is written to /etc/docker/certs.d/ghcr.io/ca.crt — docker
            # buildx automatically bind-mounts this directory into every
            # buildkitd container it creates, so buildkitd trusts our proxy
            # without any workflow changes.
            args:
              - /bin/sh
              - -c
              - |
                mkdir -p /etc/docker/certs.d/ghcr.io

                # Generate CA + server cert signed by that CA.
                openssl genrsa -out /certs/ca.key 2048 2>/dev/null
                openssl req -x509 -new -nodes -key /certs/ca.key -sha256 -days 3650 \
                  -out /certs/ca.crt -subj '/CN=ghcr-proxy-ca' 2>/dev/null

                openssl genrsa -out /certs/server.key 2048 2>/dev/null
                openssl req -new -key /certs/server.key \
                  -out /certs/server.csr -subj '/CN=ghcr.io' 2>/dev/null
                printf 'subjectAltName=DNS:ghcr.io\n' > /tmp/san.ext
                openssl x509 -req -in /certs/server.csr \
                  -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial \
                  -out /certs/server.crt -days 3650 -extfile /tmp/san.ext 2>/dev/null

                # Install CA into the Docker daemon cert store.
                # docker buildx mounts /etc/docker/certs.d/ (read-only) into
                # every buildkitd container → buildkitd trusts our proxy's cert.
                cp /certs/ca.crt /etc/docker/certs.d/ghcr.io/ca.crt

                echo "Certs ready, starting dockerd..."
                exec dockerd \
                  --host=unix:///socket/docker.sock \
                  --group=0 \
                  --insecure-registry=ghcr.io \
                  --dns=172.17.0.1
                  # ↑ All containers spawned by this daemon (job containers,
                  #   buildkitd) use 172.17.0.1 as DNS → our dnsmasq sidecar,
                  #   which resolves ghcr.io → 172.17.0.1 (docker0 gateway,
                  #   where nginx listens on 0.0.0.0:443).
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi

          # Resolves ghcr.io → 172.17.0.1 for containers inside DinD.
          # 172.17.0.1 is the docker0 bridge gateway — reachable from all
          # containers spawned by the DinD daemon. nginx listens on
          # 0.0.0.0:443 which includes 172.17.0.1.
          dnsmasq:
            image:
              repository: alpine
              tag: "3.20"
            command:
              - /bin/sh
              - -c
              - |
                apk add --no-cache dnsmasq > /dev/null 2>&1
                exec dnsmasq \
                  --no-daemon \
                  --address=/ghcr.io/172.17.0.1 \
                  --listen-address=0.0.0.0 \
                  --port=53
            securityContext:
              capabilities:
                add:
                  - NET_ADMIN
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
              limits:
                memory: 200Mi

          # Terminates TLS for ghcr.io and reverse-proxies to Zot,
          # rewriting the OCI path so images land under /ghcr.io/<org>/<name>.
          # Serves pod-level traffic (127.0.0.1 via hostAliases) AND
          # docker-bridge traffic (172.17.0.1 via dnsmasq).
          ghcr-proxy:
            image:
              repository: nginx
              tag: alpine
            command:
              - /bin/sh
              - -c
              - |
                # Wait for DinD to generate certs
                while [ ! -f /certs/server.crt ]; do sleep 1; done

                cat > /tmp/nginx.conf << 'EOF'
                worker_processes 1;
                events { worker_connections 256; }
                http {
                  client_max_body_size 0;
                  chunked_transfer_encoding on;
                  server {
                    listen 443 ssl;
                    server_name ghcr.io;
                    ssl_certificate     /certs/server.crt;
                    ssl_certificate_key /certs/server.key;

                    # OCI ping — unchanged
                    location = /v2/ {
                      proxy_pass http://zot.dev-system.svc.cluster.local:5000;
                      proxy_set_header Host $host;
                      proxy_read_timeout 900;
                      proxy_send_timeout 900;
                    }
                    # OCI API — prefix path with /ghcr.io/ so images are stored
                    # under the ghcr.io namespace in Zot (matching sync mirrors).
                    location ~ ^/v2/(.+)$ {
                      rewrite ^/v2/(.+)$ /v2/ghcr.io/$1 break;
                      proxy_pass http://zot.dev-system.svc.cluster.local:5000;
                      proxy_set_header Host $host;
                      proxy_set_header X-Forwarded-Proto https;
                      proxy_read_timeout 900;
                      proxy_send_timeout 900;
                      proxy_buffering off;
                      proxy_request_buffering off;
                    }
                  }
                }
                EOF
                nginx -c /tmp/nginx.conf -g 'daemon off;'
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi

    defaultPodOptions:
      # ghcr.io → 127.0.0.1 for pod-level containers (DinD daemon itself,
      # runner). Docker daemon pushes/pulls go through nginx on 127.0.0.1:443.
      # Containers INSIDE DinD use dnsmasq (--dns=172.17.0.1) instead.
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - "ghcr.io"

    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /data
      docker-socket:
        type: emptyDir
        globalMounts:
          - path: /socket
      # Shared between dind (writes CA+server cert) and ghcr-proxy (reads them).
      # Also bind-mounted into job containers so docker CLI trusts our CA.
      certs:
        type: emptyDir
        globalMounts:
          - path: /certs

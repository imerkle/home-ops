---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: copyparty-hdd-prod
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 200Gi
  csi:
    driver: linstor.csi.linbit.com
    fsType: ext4
    volumeAttributes:
      linstor.csi.linbit.com/mount-options: ""
      linstor.csi.linbit.com/nfs-export: nfs://linstor-csi-nfs.piraeus-datastore.svc:1000/pvc-58b983e3-ce75-4c7b-baef-972cd88c7f72
      linstor.csi.linbit.com/post-mount-xfs-opts: ""
      linstor.csi.linbit.com/remote-access-policy: "true"
      linstor.csi.linbit.com/uses-volume-context: "true"
    volumeHandle: pvc-58b983e3-ce75-4c7b-baef-972cd88c7f72
  persistentVolumeReclaimPolicy: Retain
  storageClassName: piraeus-storage
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: copyparty-hdd
  namespace: prod-system
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200Gi
  volumeName: copyparty-hdd-prod
  storageClassName: piraeus-storage

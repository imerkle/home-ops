apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      version: "v1"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "default"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

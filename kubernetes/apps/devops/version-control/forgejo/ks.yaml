---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo-oidc
spec:
  targetNamespace: dev-system
  path: ./kubernetes/apps/devops/version-control/forgejo/oidc
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app forgejo
spec:
  dependsOn:
    - name: zitadel-app
      namespace: zitadel
    - name: forgejo-oidc
  components:
    - ../../../../../components/volsync
  targetNamespace: dev-system
  path: ./kubernetes/apps/devops/version-control/forgejo/app
  postBuild:
    substitute:
      APP: *app
    substituteFrom:
      - kind: Secret
        name: forgejo-oidc-creds
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo-runner
spec:
  dependsOn:
    - name: forgejo
  # components:
  #   - ../../../../../components/volsync
  targetNamespace: dev-system
  path: ./kubernetes/apps/devops/version-control/forgejo/runner

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app omniroute
  namespace: dev-system
spec:
  dependsOn: []
  components:
    - ../../../../components/volsync
  targetNamespace: dev-system
  interval: 1h
  path: ./kubernetes/apps/devops/ai/omniroute/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: false
  postBuild:
    substitute:
      APP: *app
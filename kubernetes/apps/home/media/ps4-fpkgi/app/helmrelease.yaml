---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ps4-fpkgi
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      ps4-fpkgi:
        initContainers:
          toolchain-init:
            image:
              repository: openorbisofficial/toolchain
              tag: latest
            command:
              - /bin/sh
              - -c
              - |
                cp -a /lib/OpenOrbisSDK /toolchain/
        containers:
          app:
            image:
              repository: alpine
              tag: "3.21"
            env:
              SERVER_URL: "http://copyparty.home-system.svc.cluster.local:3923/ceph-filesystem-hdd/downloads/"
            command:
              - /bin/sh
              - -c
              - |
                apk add --no-cache bash jq
                # Keep container running for testing
                sleep infinity
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    persistence:
      scripts:
        type: configMap
        name: ps4-fpkgi-scripts
        globalMounts:
          - path: /workspace/ps4-fpkgi-json.sh
            subPath: ps4-fpkgi-json.sh
            readOnly: true
      toolchain:
        type: emptyDir
        globalMounts:
          - path: /toolchain
      workspace:
        existingClaim: copyparty-hdd
        globalMounts:
          - path: /workspace
            subPath: downloads

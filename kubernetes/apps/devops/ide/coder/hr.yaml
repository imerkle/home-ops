---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app coder
spec:
  chart:
    spec:
      chart: coder
      version: 2.29.1
      sourceRef:
        kind: HelmRepository
        name: coder-v2
        namespace: dev-system
  values:
    coder:
      resources:
        requests:
         cpu: 175m
#         memory: 600Mi
        limits:
         memory: 600Mi
      podAnnotations:
        reloader.stakater.com/auto: "true"
        vault.security.banzaicloud.io/mutate: "skip"
        vault.security.banzaicloud.io/vault-role: "default"
        vault.security.banzaicloud.io/vault-env-daemon: "true"
      env:
        - name: CODER_ACCESS_URL
          value: https://coder.${DOMAIN1}
        - name: CODER_WILDCARD_ACCESS_URL
          value: "*.coder.${DOMAIN1}"
        - name: CODER_OIDC_SIGN_IN_TEXT
          value: "Sign In with Ok8Sh"
        - name: CODER_PROMETHEUS_ENABLE
          value: "true"
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        - name: VAULT_SKIP_VERIFY
          value: "false"
        - name: VAULT_AUTH_METHOD
          value: "jwt"
        - name: VAULT_PATH
          value: "kubernetes"
        - name: VAULT_ROLE
          value: "default"
        - name: VAULT_IGNORE_MISSING_SECRETS
          value: "false"
        # - name: CODER_DISABLE_PASSWORD_AUTH
          # value: "true"
        - name: CODER_PG_CONNECTION_URL
          value: "postgres://$${vault:database/creds/coder-role#username}:$${vault:database/creds/coder-role#password}@pg-default-rw.db.svc.cluster.local:5432/coder?sslmode=disable"
        - name: CODER_OIDC_ALLOW_SIGNUPS
          value: "true"
        - name: CODER_OIDC_ISSUER_URL
          value: ${OAUTH2_ISSUER}
        - name: CODER_OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: coder-oidc-creds
              key: client_id
        - name: CODER_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: coder-oidc-creds
              key: client_secret
        - name: CODER_POSTGRES_HOST
          value: "pg-default-rw.db.svc.cluster.local"
        - name: CODER_POSTGRES_PORT
          value: "5432"
        - name: CODER_POSTGRES_USER
          value: "$${vault:database/creds/coder-role#username}"
        - name: CODER_POSTGRES_PASSWORD
          value: "$${vault:database/creds/coder-role#password}"
        - name: CODER_POSTGRES_MAIN_DB
          value: "coder"
      command:
        - /vault/vault-env
        - /opt/coder
      initContainers:
        - name: copy-vault-env
          image: ghcr.io/bank-vaults/vault-env:v1.21.3
          command: ["sh", "-c", "cp /usr/local/bin/vault-env /vault/"]
          volumeMounts:
            - name: vault-env
              mountPath: /vault/
      volumes:
        - name: syncthing-data
          persistentVolumeClaim:
            claimName: syncthing-data-shared
        - name: vault-env
          emptyDir: {}
      volumeMounts:
        - name: syncthing-data
          mountPath: /home/coder/shared
          subPath: dotfiles
        - name: vault-env
          mountPath: /vault/
      # extraContainers:

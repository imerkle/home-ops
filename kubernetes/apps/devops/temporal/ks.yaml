---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app temporal
  namespace: flux-system
spec:
  targetNamespace: dev-system
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn: []
  components:
    - ../../../../components/volsync
  interval: 1h
  path: ./kubernetes/apps/devops/temporal/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: false
  postBuild:
    substitute:
      APP: *app

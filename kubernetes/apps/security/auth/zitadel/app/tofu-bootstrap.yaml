---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: zitadel-bootstrap
spec:
  interval: 1h
  retryInterval: 1h
  retryStrategy: StaticInterval
  approvePlan: auto
  tfstate:
    forceUnlock: yes
    lockIdentifier: "20db2920-fe23-14d9-e3e1-96123e840fc6"
  path: ./terraform/zitadel-bootstrap

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  writeOutputsToSecret:
    name: zitadel-bootstrap-ids
    outputs:
      - org_id
      - project_id

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
# Preview template for game-fetcher branch deployments.
# Placeholders replaced by the deploy-preview Tekton task:
#   react-ui  → sanitized branch name (e.g. "feature-cool")
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app game-fetcher-react-ui
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      game-fetcher-react-ui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: zot.${DOMAIN1}/game-fetcher
              tag: react-ui
            env:
              PORT: &port "3000"
              RAWG: "vault:secret/data/ext_services#RAWG"
              OIDC_CLIENT_ID: "vault:secret/data/ext_services#OIDC_CLIENT_ID"
              OIDC_CLIENT_SECRET: "vault:secret/data/ext_services#OIDC_CLIENT_SECRET"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 300Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: game-fetcher-react-ui
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "react-ui-game-fetcher.${DOMAIN1}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - port: *port
                name: *app

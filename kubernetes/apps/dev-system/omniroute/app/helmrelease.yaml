---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: omniroute
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      omniroute:
        containers:
          app:
            image:
              repository: diegosouzapw/omniroute
              tag: latest
            ports:
              - name: http
                containerPort: 20128
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 500Mi
    service:
      app:
        controller: omniroute
        ports:
          http:
            port: 20128
            targetPort: 20128
    route:
      app:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - "{{ .Release.Name }}.${DOMAIN1}"
        rules:
          - backendRefs:
              - port: 20128
                name: omniroute
    persistence:
      data:
        type: emptyDir
        # existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/data
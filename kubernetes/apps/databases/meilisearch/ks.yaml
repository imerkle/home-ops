---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: meilisearch
spec:
  path: ./kubernetes/apps/databases/meilisearch/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  prune: true
  wait: false
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  targetNamespace: db
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: meilisearch
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_EXISTING_CLAIM: "true"

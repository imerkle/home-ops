---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: blocky
spec:
  components:
    - ../../../../../components/volsync
  postBuild:
    substitute:
      APP: blocky
      VOLSYNC_CAPACITY: 1Gi
  targetNamespace: home-system
  dependsOn:
  path: ./kubernetes/apps/home/networking/blocky/app

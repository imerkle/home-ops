---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tekton-pipelines
spec:
  interval: 1h
  chart:
    spec:
      chart: tekton-pipeline
      version: 1.6.1
      sourceRef:
        kind: HelmRepository
        name: tekton
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    crds: CreateReplace
  uninstall:
    keepHistory: false
  values:
    namespace:
      name: dev-system
      create: false
      labels:
        app.kubernetes.io/part-of: tekton-pipelines
    auth:
      git:
        username: ""
        password: ""
        url: ""
      docker:
        configJson: ""
    serviceaccount:
      enabled: true
    controller:
      deployment:
        labels: {}
      pod:
        labels: {}
        annotations: {}
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 512Mi
    webhook:
      deployment:
        labels: {}
      pod:
        labels: {}
    remoteresolver:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi

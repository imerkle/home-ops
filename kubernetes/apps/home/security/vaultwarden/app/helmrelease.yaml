---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      vaultwarden:
        annotations:
          reloader.stakater.com/auto: "true"
          vault.security.banzaicloud.io/vault-role: "default"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 16.4
            env:
              INIT_POSTGRES_DBNAME: vaultwarden
              INIT_POSTGRES_HOST: "pg-default-rw.db.svc.cluster.local"
              INIT_POSTGRES_USER: "vault:database/creds/init-role#username"
              INIT_POSTGRES_PASS: "vault:database/creds/init-role#password"
              PGDATABASE: "postgres"
              INIT_POSTGRES_SUPER_USER: "vault:database/creds/init-role#username"
              INIT_POSTGRES_SUPER_PASS: "vault:database/creds/init-role#password"
          init-db-grants:
            image:
              repository: ghcr.io/cloudnative-pg/postgresql
              tag: "15.2-11"
            command: ["/bin/sh", "-c"]
            args:
              - |
                until pg_isready -h pg-default-rw.db.svc.cluster.local -U "$SUPER_USER"; do sleep 2; done
                psql "postgresql://$SUPER_USER:$SUPER_PASS@pg-default-rw.db.svc.cluster.local:5432/vaultwarden" <<SQL
                  GRANT CONNECT ON DATABASE vaultwarden TO PUBLIC;
                  GRANT ALL PRIVILEGES ON SCHEMA public TO PUBLIC;
                  GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO PUBLIC;
                  GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO PUBLIC;
                  ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO PUBLIC;
                  ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO PUBLIC;
                SQL
            env:
              SUPER_USER: "vault:database/creds/init-role#username"
              SUPER_PASS: "vault:database/creds/init-role#password"
        containers:
          app:
            image:
              repository: vaultwarden/server
              tag: latest
            env:
              TZ: America/New_York
              DOMAIN: "https://vaultwarden.${DOMAIN1}"
              ADMIN_TOKEN: "$${vault:secret/data/vaultwarden#ADMIN_TOKEN}"
              DATABASE_URL: "postgresql://$${vault:database/creds/app-role#username}:$${vault:database/creds/app-role#password}@pg-default-rw.db.svc.cluster.local:5432/vaultwarden?sslmode=disable"
              SSO_ENABLED: "true"
              SSO_AUTHORITY: "https://zitadel.${DOMAIN1}"
              SSO_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: vaultwarden-oidc-creds
                    key: client_id
              SSO_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: vaultwarden-oidc-creds
                    key: client_secret
              RELOAD_TEMPLATES: "true"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /alive
                    port: 80
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi

    service:
      app:
        ports:
          http:
            port: 80

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Vaultwarden
          gethomepage.dev/description: Password Manager
          gethomepage.dev/group: Utility
          gethomepage.dev/icon: vaultwarden.png
        hostnames:
          - "{{ .Release.Name }}.${DOMAIN1}"
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      data:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /data

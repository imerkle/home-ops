---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nuviostreams
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      nuviostreams:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: zot.x3y.space/nuviostreams
              tag: latest
              pullPolicy: Always
            env:
              DISABLE_CACHE: "false"
              DISABLE_STREAM_CACHE: "false"
              USE_REDIS_CACHE: "false"
              REDIS_URL: ""
              ENABLE_PSTREAM_API: "false"
              DISABLE_URL_VALIDATION: "false"
              DISABLE_4KHDHUB_URL_VALIDATION: "true"
              ENABLE_VIDZEE_PROVIDER: "true"
              ENABLE_VIXSRC_PROVIDER: "true"
              ENABLE_MP4HYDRA_PROVIDER: "true"
              ENABLE_UHDMOVIES_PROVIDER: "true"
              ENABLE_MOVIESMOD_PROVIDER: "true"
              ENABLE_TOPMOVIES_PROVIDER: "true"
              ENABLE_MOVIESDRIVE_PROVIDER: "true"
              ENABLE_4KHDHUB_PROVIDER: "true"
              ENABLE_MOVIEBOX_PROVIDER: "true"
              ENABLE_SOAPERTV_PROVIDER: "true"
              USE_EXTERNAL_PROVIDERS: "false"
              PORT: &port "7777"
              TMDB_API_KEY: "vault:secret/data/tmdb#API_KEY"
            envFrom:
              - secretRef:
                  name: nuviostreams-secret
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /manifest.json
                    port: 7777
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness: *probe
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: nuviostreams
        ports:
          http:
            port: 7777
    route:
      app:
        hostnames:
          - "nuviostreams.${DOMAIN1}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/name: Nuvio Streams
          gethomepage.dev/icon: mdi-movie-open-play
    persistence:
      cookie:
        type: secret
        name: nuviostreams-secret
        advancedMounts:
          nuviostreams:
            app:
              - path: /app/cookies.txt
                subPath: cookies.txt
                readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: piraeus-storage
provisioner: linstor.csi.linbit.com
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
parameters:
  linstor.csi.linbit.com/storagePool: hdd-pool
---
# Piraeus Storage (LINSTOR)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-piraeus-storage
spec:
  storageClassName: piraeus-storage
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: fio-piraeus-storage
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
      - name: fio
        image: dmonakhov/alpine-fio
        command: ["fio"]
        args: ["--name=benchtest", "--filename=/volume/testfile", "--size=2G", "--rw=randrw", "--rwmixread=75", "--bs=4k", "--ioengine=libaio", "--iodepth=16", "--numjobs=1", "--time_based", "--runtime=60", "--group_reporting", "--direct=1"]
        volumeMounts:
        - name: vol
          mountPath: /volume
      restartPolicy: Never
      volumes:
      - name: vol
        persistentVolumeClaim:
          claimName: pvc-piraeus-storage

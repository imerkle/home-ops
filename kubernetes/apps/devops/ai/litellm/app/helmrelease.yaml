---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: "16.4"
            env:
              INIT_POSTGRES_DBNAME: "litellm"
              INIT_POSTGRES_HOST: "pg-default-rw.db.svc.cluster.local"
              INIT_POSTGRES_USER: "vault:database/creds/init-role#username"
              INIT_POSTGRES_PASS: "vault:database/creds/init-role#password"
              INIT_POSTGRES_SUPER_PASS: "vault:database/creds/init-role#password"
          init-db-grants:
            image:
              repository: ghcr.io/cloudnative-pg/postgresql
              tag: "15.2-11"
            command: ["/bin/sh", "-c"]
            args:
              - |
                until pg_isready -h pg-default-rw.db.svc.cluster.local -U "$SUPER_USER"; do sleep 2; done
                psql "postgresql://$SUPER_USER:$SUPER_PASS@pg-default-rw.db.svc.cluster.local:5432/litellm" <<SQL
                  GRANT CONNECT ON DATABASE litellm TO PUBLIC;
                  GRANT USAGE ON SCHEMA public TO PUBLIC;
                  GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO PUBLIC;
                  GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO PUBLIC;
                  ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO PUBLIC;
                  ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO PUBLIC;
                SQL
            env:
              SUPER_USER: "vault:database/creds/init-role#username"
              SUPER_PASS: "vault:database/creds/init-role#password"
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.81.3-stable
            args:
              - --port
              - &port "4000"
              - --config
              - /app/config.yaml
            env:
              LITELLM_MASTER_KEY: "vault:secret/data/ai#LITELLM_MASTER_KEY"
              LITELLM_SALT_KEY: "vault:secret/data/ai#LITELLM_SALT_KEY"
              GOOGLE_API_KEY: "vault:secret/data/ai#google"
              CONTEXT7_API_KEY: "vault:secret/data/ai#CONTEXT7_API_KEY"
              DATABASE_URL: "postgresql://$${vault:database/creds/app-role#username}:$${vault:database/creds/app-role#password}@pg-default-rw.db.svc.cluster.local:5432/litellm"
            # probes:
            #   liveness:
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /health/liveliness
            #         port: &port 4000
            #       initialDelaySeconds: 30
            #       periodSeconds: 60
            #       timeoutSeconds: 10
            #       failureThreshold: 3
            #   readiness:
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /health/readiness
            #         port: *port
            #       initialDelaySeconds: 5
            #       periodSeconds: 5
            #       timeoutSeconds: 5
            #       failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 300Mi
              limits:
                memory: 800Mi
    service:
      app:
        controller: litellm
        ports:
          http:
            port: *port
    route:
      app:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - "{{ .Release.Name }}.${DOMAIN1}"

        rules:
          - backendRefs:
              - port: *port
                name: litellm
    persistence:
      config:
        type: configMap
        name: litellm-configmap
        globalMounts:
          - path: /app/config.yaml
            subPath: config.yaml
      cache:
        type: emptyDir
        globalMounts:
          - path: /.cache
            subPath: cache
          - path: /.npm
            subPath: npm
          - path: /tmp
            subPath: tmp
---
# TriggerTemplate: build-and-push
# Creates a PipelineRun when triggered by a Forgejo webhook
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: build-and-push
  labels:
    app.kubernetes.io/part-of: tekton-tasks
spec:
  params:
    - name: git-repo-url
      description: The git repository URL from the webhook payload.
    - name: git-revision
      description: The git revision (branch/tag/sha) from the webhook payload.
      default: main
    - name: git-repo-name
      description: The repository name (used for image naming).
    - name: image-tag
      description: The image tag to use (defaults to commit SHA).
      default: latest
    - name: git-ref
      description: The git reference (e.g., refs/heads/main).
      default: refs/heads/main
    - name: home-ops-url
      description: SSH URL of the home-ops GitHub repository.
      default: git@github.com:imerkle/home-ops.git
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: build-$(tt.params.git-repo-name)-
        labels:
          app.kubernetes.io/part-of: tekton-tasks
          tekton.dev/pipeline: build-and-push
      spec:
        pipelineRef:
          name: build-and-push
        params:
          - name: repo-url
            value: $(tt.params.git-repo-url)
          - name: revision
            value: $(tt.params.git-revision)
          - name: image
            value: "zot.dev-system.svc.cluster.local:5000/$(tt.params.git-repo-name):$(tt.params.image-tag)"
          - name: image-latest
            value: "zot.dev-system.svc.cluster.local:5000/$(tt.params.git-repo-name):latest"
          - name: git-ref
            value: $(tt.params.git-ref)
          - name: base-image
            value: "zot.dev-system.svc.cluster.local:5000/$(tt.params.git-repo-name)"
          - name: repo-name
            value: $(tt.params.git-repo-name)
          - name: home-ops-url
            value: $(tt.params.home-ops-url)
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 1Gi
          - name: ssh-credentials
            secret:
              secretName: tekton-github-ssh

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mautrix-telegram
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      mautrix-telegram:
        labels:
          postgres: "true"
        annotations:
          reloader.stakater.com/auto: "true"
          vault.security.banzaicloud.io/vault-role: "default"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 16.4
            env:
              INIT_POSTGRES_DBNAME: "mautrix-telegram"
              INIT_POSTGRES_HOST: "vault:secret/data/pg_default#HOST"
              INIT_POSTGRES_USER: "vault:secret/data/pg_default#USER"
              INIT_POSTGRES_PASS: "vault:secret/data/pg_default#PASSWORD"
              INIT_POSTGRES_SUPER_PASS: "vault:secret/data/pg_default#PASSWORD"
          copy-config:
            image:
              repository: public.ecr.aws/docker/library/busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - cp /tmp/config/* /data/
        containers:
          app:
            image:
              repository: dock.mau.dev/mautrix/telegram
              tag: v0.15.3
            command: ["python3", "-m", "mautrix_telegram"]
            args: [ "-c", "/data/config.yaml", "--no-update" ]
            env:
              TZ: America/New_York
              # MAUTRIX_DIRECT_STARTUP: false
              # DB_USER: "vault:secret/data/pg_default#USER"
              # DB_PASS: "vault:secret/data/pg_default#PASSWORD"
              # DB_HOST: "vault:secret/data/pg_default#HOST"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 29317
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 404"]
        hostnames:
          - "{{ .Release.Name }}.x3y.space"
        parentRefs:
          - name: envoy-internal
            namespace: networking
    persistence:
      config:
        type: configMap
        name: mautrix-telegram-config
        advancedMounts:
          mautrix-telegram:
            copy-config:
              - path: /tmp/config
      data:
        existingClaim: mautrix-telegram
        globalMounts:
          - path: /data
      tmpfs:
        type: emptyDir
        advancedMounts:
          mautrix-telegram:
            app:
              - path: /tmp
                subPath: tmp

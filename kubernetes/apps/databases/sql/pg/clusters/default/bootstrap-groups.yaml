---
# One-time Job to create PostgreSQL NOLOGIN group roles.
# Dynamic login users created by Vault will inherit permissions via IN ROLE.
# Safe to re-run — uses DO $$ ... EXCEPTION WHEN duplicate_object to be idempotent.
apiVersion: batch/v1
kind: Job
metadata:
  name: pg-bootstrap-groups
  namespace: db
  annotations:
    # Re-run by deleting and re-applying this Job if you need to update grants
    argocd.argoproj.io/hook: Skip
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: ghcr.io/cloudnative-pg/postgresql:15.2-11
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-default-superuser
                  key: password
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: pg-default-superuser
                  key: username
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              PG_HOST="pg-default-rw.db.svc.cluster.local"

              echo "==> Creating NOLOGIN group roles..."
              psql "postgresql://${PGUSER}@${PG_HOST}:5432/postgres" <<'SQL'
                DO $$ BEGIN CREATE ROLE game_fetcher_grp    NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
                DO $$ BEGIN CREATE ROLE settings_server_grp NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
                DO $$ BEGIN CREATE ROLE atuin_grp           NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
                DO $$ BEGIN CREATE ROLE vaultwarden_grp     NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
                DO $$ BEGIN CREATE ROLE zealot_grp          NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
                DO $$ BEGIN CREATE ROLE zitadel_grp         NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
                DO $$ BEGIN CREATE ROLE forgejo_grp         NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
                DO $$ BEGIN CREATE ROLE coder_grp           NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
                DO $$ BEGIN CREATE ROLE litellm_grp         NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
                DO $$ BEGIN CREATE ROLE keto_grp            NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
                DO $$ BEGIN CREATE ROLE temporal_grp        NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
                DO $$ BEGIN CREATE ROLE mautrix_discord_grp  NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
                DO $$ BEGIN CREATE ROLE mautrix_whatsapp_grp NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
                DO $$ BEGIN CREATE ROLE mautrix_telegram_grp NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
                DO $$ BEGIN CREATE ROLE synapse_grp         NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
                DO $$ BEGIN CREATE ROLE mas_grp             NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
              SQL
              echo "==> Group roles created."

              echo "==> Granting permissions per database..."

              # game-fetcher
              psql "postgresql://${PGUSER}@${PG_HOST}:5432/gamefetcher" <<'SQL'
                GRANT CONNECT ON DATABASE gamefetcher TO game_fetcher_grp;
                GRANT USAGE ON SCHEMA public TO game_fetcher_grp;
                GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO game_fetcher_grp;
                GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO game_fetcher_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO game_fetcher_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO game_fetcher_grp;
              SQL

              # settings-server
              psql "postgresql://${PGUSER}@${PG_HOST}:5432/settings_server" <<'SQL'
                GRANT CONNECT ON DATABASE settings_server TO settings_server_grp;
                GRANT USAGE ON SCHEMA public TO settings_server_grp;
                GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO settings_server_grp;
                GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO settings_server_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO settings_server_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO settings_server_grp;
              SQL

              # atuin
              psql "postgresql://${PGUSER}@${PG_HOST}:5432/atuin" <<'SQL'
                GRANT CONNECT ON DATABASE atuin TO atuin_grp;
                GRANT USAGE ON SCHEMA public TO atuin_grp;
                GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO atuin_grp;
                GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO atuin_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO atuin_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO atuin_grp;
              SQL

              # vaultwarden
              psql "postgresql://${PGUSER}@${PG_HOST}:5432/vaultwarden" <<'SQL'
                GRANT CONNECT ON DATABASE vaultwarden TO vaultwarden_grp;
                GRANT USAGE ON SCHEMA public TO vaultwarden_grp;
                GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO vaultwarden_grp;
                GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO vaultwarden_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO vaultwarden_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO vaultwarden_grp;
              SQL

              # zealot
              psql "postgresql://${PGUSER}@${PG_HOST}:5432/zealot" <<'SQL'
                GRANT CONNECT ON DATABASE zealot TO zealot_grp;
                GRANT USAGE ON SCHEMA public TO zealot_grp;
                GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO zealot_grp;
                GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO zealot_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO zealot_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO zealot_grp;
              SQL

              # zitadel
              psql "postgresql://${PGUSER}@${PG_HOST}:5432/zitadel" <<'SQL'
                GRANT CONNECT ON DATABASE zitadel TO zitadel_grp;
                GRANT USAGE ON SCHEMA public TO zitadel_grp;
                GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO zitadel_grp;
                GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO zitadel_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO zitadel_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO zitadel_grp;
              SQL

              # forgejo
              psql "postgresql://${PGUSER}@${PG_HOST}:5432/forgejo" <<'SQL'
                GRANT CONNECT ON DATABASE forgejo TO forgejo_grp;
                GRANT USAGE ON SCHEMA public TO forgejo_grp;
                GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO forgejo_grp;
                GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO forgejo_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO forgejo_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO forgejo_grp;
              SQL

              # coder
              psql "postgresql://${PGUSER}@${PG_HOST}:5432/coder" <<'SQL'
                GRANT CONNECT ON DATABASE coder TO coder_grp;
                GRANT USAGE ON SCHEMA public TO coder_grp;
                GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO coder_grp;
                GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO coder_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO coder_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO coder_grp;
              SQL

              # litellm
              psql "postgresql://${PGUSER}@${PG_HOST}:5432/litellm" <<'SQL'
                GRANT CONNECT ON DATABASE litellm TO litellm_grp;
                GRANT USAGE ON SCHEMA public TO litellm_grp;
                GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO litellm_grp;
                GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO litellm_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO litellm_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO litellm_grp;
              SQL

              # keto
              psql "postgresql://${PGUSER}@${PG_HOST}:5432/keto" <<'SQL'
                GRANT CONNECT ON DATABASE keto TO keto_grp;
                GRANT USAGE ON SCHEMA public TO keto_grp;
                GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO keto_grp;
                GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO keto_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO keto_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO keto_grp;
              SQL

              # temporal (uses multiple databases)
              for DB in temporal temporal_visibility; do
                psql "postgresql://${PGUSER}@${PG_HOST}:5432/${DB}" <<SQL
                  GRANT CONNECT ON DATABASE ${DB} TO temporal_grp;
                  GRANT USAGE ON SCHEMA public TO temporal_grp;
                  GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO temporal_grp;
                  GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO temporal_grp;
                  ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO temporal_grp;
                  ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO temporal_grp;
              SQL
              done

              # mautrix bridges
              for APP in discord whatsapp telegram; do
                DB="mautrix_${APP}"
                GRP="mautrix_${APP}_grp"
                psql "postgresql://${PGUSER}@${PG_HOST}:5432/${DB}" <<SQL
                  GRANT CONNECT ON DATABASE ${DB} TO ${GRP};
                  GRANT USAGE ON SCHEMA public TO ${GRP};
                  GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO ${GRP};
                  GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO ${GRP};
                  ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO ${GRP};
                  ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO ${GRP};
              SQL
              done

              # matrix-stack (synapse + mas)
              psql "postgresql://${PGUSER}@${PG_HOST}:5432/synapse" <<'SQL'
                GRANT CONNECT ON DATABASE synapse TO synapse_grp;
                GRANT USAGE ON SCHEMA public TO synapse_grp;
                GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO synapse_grp;
                GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO synapse_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO synapse_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO synapse_grp;
              SQL

              psql "postgresql://${PGUSER}@${PG_HOST}:5432/matrix_authentication_service" <<'SQL'
                GRANT CONNECT ON DATABASE matrix_authentication_service TO mas_grp;
                GRANT USAGE ON SCHEMA public TO mas_grp;
                GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO mas_grp;
                GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO mas_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO mas_grp;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO mas_grp;
              SQL

              echo "==> Bootstrap complete."

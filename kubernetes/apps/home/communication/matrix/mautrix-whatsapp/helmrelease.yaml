---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mautrix-whatsapp
  labels:
    security.banzaicloud.io/mutate: skip
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      mautrix-whatsapp:
        labels:
          postgres: "true"
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          copy-config:
            image:
              repository: public.ecr.aws/docker/library/python
              tag: 3.11-alpine
            command: ["python3", "-c"]
            args:
              - |
                import os
                with open('/tmp/config/config.yaml', 'r') as f:
                    content = f.read()
                content = content.replace(f"{chr(36)}{chr(123)}DB_USER{chr(125)}", os.environ['DB_USER'])
                content = content.replace(f"{chr(36)}{chr(123)}DB_PASS{chr(125)}", os.environ['DB_PASS'])
                with open('/data/config.yaml', 'w') as f:
                    f.write(content)
            env:
              DB_USER:
                valueFrom:
                  secretKeyRef:
                    name: mautrix-whatsapp-db-creds
                    key: username
              DB_PASS:
                valueFrom:
                  secretKeyRef:
                    name: mautrix-whatsapp-db-creds
                    key: password
        containers:
          app:
             image:
               repository: dock.mau.dev/mautrix/whatsapp
               tag: v0.2602.0
             command: ["/usr/bin/mautrix-whatsapp"]
             args: [ "-c", "/data/config.yaml", "--no-update" ]
             workingDir: /data
             env:
               TZ: ${TIMEZONE}
               DB_USER:
                 valueFrom:
                   secretKeyRef:
                     name: mautrix-whatsapp-db-creds
                     key: username
               DB_PASS:
                 valueFrom:
                   secretKeyRef:
                     name: mautrix-whatsapp-db-creds
                     key: password
             securityContext:
               allowPrivilegeEscalation: false
               readOnlyRootFilesystem: true
               capabilities: {drop: ["ALL"]}
             resources:
               requests:
                 cpu: 10m
                 memory: 128Mi
               limits:
                 memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 8000
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 404"]
        hostnames:
          - "{{ .Release.Name }}.${DOMAIN1}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
    persistence:
      config:
        type: configMap
        name: mautrix-whatsapp-config
        advancedMounts:
          mautrix-whatsapp:
            copy-config:
              - path: /tmp/config
      data:
        type: emptyDir
        globalMounts:
          - path: /data
      tmpfs:
        type: emptyDir
        advancedMounts:
          mautrix-whatsapp:
            app:
              - path: /tmp
                subPath: tmp

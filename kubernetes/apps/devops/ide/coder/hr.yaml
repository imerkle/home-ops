---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app coder
spec:
  chart:
    spec:
      chart: coder
      version: 2.29.1
      sourceRef:
        kind: HelmRepository
        name: coder-v2
        namespace: dev-system
  values:
    coder:
      resources:
        requests:
         cpu: 175m
#         memory: 600Mi
        limits:
         memory: 600Mi
      podAnnotations:
        reloader.stakater.com/auto: "true"
        vault.security.banzaicloud.io/vault-role: "default"
      initContainers:
        - name: 01-init-db
          image: ghcr.io/onedr0p/postgres-init:16.4
          imagePullPolicy: IfNotPresent
          env:
            - name: INIT_POSTGRES_DBNAME
              value: "coder"
            - name: INIT_POSTGRES_HOST
              value: "pg-default-rw.db.svc.cluster.local"
            - name: INIT_POSTGRES_USER
              value: "vault:database/creds/init-role#username"
            - name: INIT_POSTGRES_PASS
              value: "vault:database/creds/init-role#password"
            - name: INIT_POSTGRES_SUPER_PASS
              value: "vault:database/creds/init-role#password"
        - name: 02-init-db-grants
          image: ghcr.io/cloudnative-pg/postgresql:15.2-11
          command: ["/bin/sh", "-c"]
          args:
            - |
              until pg_isready -h pg-default-rw.db.svc.cluster.local -U "$SUPER_USER"; do sleep 2; done
              psql "postgresql://$SUPER_USER:$SUPER_PASS@pg-default-rw.db.svc.cluster.local:5432/coder" <<SQL
                GRANT CONNECT ON DATABASE coder TO PUBLIC;
                GRANT USAGE ON SCHEMA public TO PUBLIC;
                GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO PUBLIC;
                GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO PUBLIC;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO PUBLIC;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO PUBLIC;
              SQL
          env:
            - name: SUPER_USER
              value: "vault:database/creds/init-role#username"
            - name: SUPER_PASS
              value: "vault:database/creds/init-role#password"
      env:
        - name: CODER_ACCESS_URL
          value: https://coder.${DOMAIN1}
        - name: CODER_WILDCARD_ACCESS_URL
          value: "*.coder.${DOMAIN1}"
        - name: CODER_OIDC_SIGN_IN_TEXT
          value: "Sign In with Ok8Sh"
        - name: CODER_PROMETHEUS_ENABLE
          value: "true"
        # - name: CODER_DISABLE_PASSWORD_AUTH
          # value: "true"
        - name: CODER_PG_CONNECTION_URL
          value: "postgres://$${vault:database/creds/app-role#username}:$${vault:database/creds/app-role#password}@pg-default-rw.db.svc.cluster.local:5432/coder?sslmode=disable"
        - name: CODER_OIDC_ALLOW_SIGNUPS
          value: "true"
        - name: CODER_OIDC_ISSUER_URL
          value: ${OAUTH2_ISSUER}
        - name: CODER_OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: coder-oidc-creds
              key: client_id
        - name: CODER_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: coder-oidc-creds
              key: client_secret
        - name: CODER_POSTGRES_HOST
          value: "pg-default-rw.db.svc.cluster.local"
        - name: CODER_POSTGRES_PORT
          value: "5432"
        - name: CODER_POSTGRES_USER
          value: "vault:database/creds/app-role#username"
        - name: CODER_POSTGRES_PASSWORD
          value: "vault:database/creds/app-role#password"
        - name: CODER_POSTGRES_MAIN_DB
          value: "coder"
      volumes:
        - name: syncthing-data
          persistentVolumeClaim:
            claimName: syncthing-data-shared
      volumeMounts:
        - name: syncthing-data
          mountPath: /home/coder/shared
          subPath: dotfiles

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: atuin-db-creds
  namespace: home-system
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: atuin-db-creds
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        ATUIN_DB_URI: "postgres://{{ .username }}:{{ .password }}@pg-default-rw.db.svc.cluster.local:5432/atuin_db?sslmode=disable"
  data:
    - secretKey: username
      remoteRef:
        key: database/static-creds/atuin-static
        property: username
    - secretKey: password
      remoteRef:
        key: database/static-creds/atuin-static
        property: password

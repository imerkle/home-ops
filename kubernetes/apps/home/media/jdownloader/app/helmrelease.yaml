---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jdownloader
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      jdownloader:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: jlesage/jdownloader-2
              tag: latest
            env:
              TZ: America/New_York
            resources:
              requests:
                cpu: 50m
                memory: 500Mi
              limits:
                memory: 2Gi
    service:
      app:
        controller: jdownloader
        ports:
          http:
            port: 5800
    route:
      app:
        labels:
          enabled-oidc: "true"
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: JDownloader
          gethomepage.dev/description: Download Manager
          gethomepage.dev/group: Media
          gethomepage.dev/icon: jdownloader.png
        hostnames:
          - "{{ .Release.Name }}.${DOMAIN1}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
      output:
        existingClaim: copyparty-hdd
        globalMounts:
          - path: /output
            subPath: downloads
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linstor-cluster
spec:
  interval: 2h
  chart:
    spec:
      chart: linstor-cluster
      version: 1.1.1
      sourceRef:
        kind: HelmRepository
        name: piraeus-charts
        namespace: piraeus-datastore
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    linstorCluster:
      patches:
        - target:
            kind: Deployment
            name: linstor-csi-controller
          patch: |
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: linstor-csi-controller
            spec:
              template:
                spec:
                  containers:
                    - name: linstor-csi-nfs-server
                      $patch: delete
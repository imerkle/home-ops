apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vaultwarden-db-creds
  namespace: home-system
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: vaultwarden-db-creds
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DATABASE_URL: "postgresql://{{ .username }}:{{ .password }}@pg-default-rw.db.svc.cluster.local:5432/vaultwarden?sslmode=disable"
  data:
    - secretKey: username
      remoteRef:
        key: database/static-creds/vaultwarden-static
        property: username
    - secretKey: password
      remoteRef:
        key: database/static-creds/vaultwarden-static
        property: password

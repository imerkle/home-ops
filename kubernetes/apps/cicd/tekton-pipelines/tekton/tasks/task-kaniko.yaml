apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kaniko-build
  labels:
    app.kubernetes.io/version: "0.7"
  annotations:
    tekton.dev/pipelines.minVersion: "0.43.0"
    tekton.dev/categories: Image Build
    tekton.dev/tags: image-build
    tekton.dev/displayName: "Build and upload container image using Kaniko"
    tekton.dev/platforms: "linux/amd64,linux/arm64,linux/ppc64le"
    tekton.dev/deprecated: "true"
spec:
  description: >-
    This Task builds a simple Dockerfile with kaniko and pushes to a registry.
    This Task stores the image name and digest as results, allowing Tekton Chains to pick up
    that an image was built & sign it.
  params:
    - name: IMAGE
      description: Name (reference) of the image to build.
    - name: DOCKERFILE
      description: Path to the Dockerfile to build.
      default: ./Dockerfile
    - name: CONTEXT
      description: The build context used by Kaniko.
      default: ./
    - name: EXTRA_ARGS
      type: array
      default: []
    - name: PROTOCOL
      description: Protocol to use for the image URL (http or https).
      default: https
    - name: BUILDER_IMAGE
      description: The image on which builds will run (default is v1.5.1)
      default: gcr.io/kaniko-project/executor:v1.23.2-debug
    - name: WRITER_IMAGE
      description: The image on which the write-url step will run (default is docker.io/library/bash:5.1.4@sha256:c523c636b722339f41b6a431b44588ab2f762c5de5ec3bd7964420ff982fb1d9)
      default: docker.io/library/bash:5.1.4@sha256:c523c636b722339f41b6a431b44588ab2f762c5de5ec3bd7964420ff982fb1d9
  workspaces:
    - name: source
      description: Holds the context and Dockerfile
    - name: dockerconfig
      description: Includes a docker `config.json`
      optional: true
      mountPath: /kaniko/.docker
    - name: ssh-credentials
      description: SSH key for accessing private Forgejo repos during go mod download
      optional: true
      mountPath: /tekton/home/.ssh-secret
  results:
    - name: IMAGE_DIGEST
      description: Digest of the image just built.
    - name: IMAGE_URL
      description: URL of the image just built.
  steps:
    # Step 0: Pre-download Go modules outside Docker using real SSH credentials.
    # Sets GONOSUMDB/GOPRIVATE, configures git SSH rewrite for forgejo.x3y.space,
    # and runs `go mod download` into .gopath/ inside the build context.
    # The Dockerfile then copies .gopath/ into /go/ and builds with GOPROXY=off —
    # no network access needed inside the Docker build at all.
    - name: go-mod-download
      image: golang:1.26.2-alpine
      script: |
        #!/bin/sh
        set -e
        CONTEXT_DIR="$(workspaces.source.path)/$(params.CONTEXT)"

        # Only run if this is a Go project
        if [ ! -f "$CONTEXT_DIR/go.mod" ]; then
          echo "[go-mod-download] No go.mod found, skipping."
          exit 0
        fi

        SSH_SECRET="$(workspaces.ssh-credentials.path)"
        if [ ! -f "$SSH_SECRET/identity" ]; then
          echo "[go-mod-download] No SSH credentials mounted, skipping (public modules only)."
          exit 0
        fi

        # Install git + openssh (needed for SSH-based go mod download)
        apk add --no-cache git openssh-client

        # Set up SSH key
        mkdir -p /root/.ssh
        cp "$SSH_SECRET/identity" /root/.ssh/id_ed25519
        chmod 600 /root/.ssh/id_ed25519
        # Start with any existing known_hosts from the secret (e.g. GitHub)
        if [ -f "$SSH_SECRET/known_hosts" ]; then
          cp "$SSH_SECRET/known_hosts" /root/.ssh/known_hosts
        fi
        # Append Forgejo's host key (the secret only has GitHub's key)
        ssh-keyscan -H ssh.forgejo.x3y.space >> /root/.ssh/known_hosts
        chmod 600 /root/.ssh/known_hosts

        # Rewrite HTTPS → SSH for all forgejo.x3y.space module fetches
        git config --global url."git@ssh.forgejo.x3y.space:".insteadOf "https://forgejo.x3y.space/"

        echo "[go-mod-download] Downloading modules into .gopath/ ..."
        cd "$CONTEXT_DIR"
        GOPATH="$CONTEXT_DIR/.gopath" \
        GONOSUMDB="forgejo.x3y.space/*" \
        GOPRIVATE="forgejo.x3y.space/*" \
          go mod download
        echo "[go-mod-download] Done."
    # Step 1: Parse .build-args into --build-arg flags for Kaniko.
    # Writes a file to the shared workspace so the next step can consume it.
    - name: prepare-build-args
      image: docker.io/library/alpine:3.18
      script: |
        #!/bin/sh
        set -e
        BUILD_ARGS_FILE="$(workspaces.source.path)/$(params.CONTEXT)/.build-args"
        KANIKO_ARGS_FILE="$(workspaces.source.path)/.tekton-kaniko-build-args"

        # Always create the file (empty if no .build-args exists)
        : > "$KANIKO_ARGS_FILE"

        if [ ! -f "$BUILD_ARGS_FILE" ]; then
          echo "[prepare] No .build-args file found, skipping."
          exit 0
        fi

        echo "[prepare] Parsing .build-args into Kaniko --build-arg flags:"
        while IFS= read -r line || [ -n "$line" ]; do
          # Strip carriage returns (CRLF support)
          line=$(echo "$line" | tr -d '\r')
          # Skip empty/comment lines
          case "$line" in ''|'#'*) continue ;; esac
          # Ensure line contains '='
          case "$line" in *=*) ;; *) continue ;; esac

          KEY=$(echo "$line" | cut -d'=' -f1 | tr -d '[:space:]')
          VAL=$(echo "$line" | cut -d'=' -f2-)
          if [ -n "$KEY" ]; then
            echo "  --build-arg $KEY=$VAL"
            printf '%s\n' "--build-arg=$KEY=$VAL" >> "$KANIKO_ARGS_FILE"
          fi
        done < "$BUILD_ARGS_FILE"
        echo "[prepare] Wrote $(wc -l < "$KANIKO_ARGS_FILE") build-arg flags."
        echo "$(cat "$KANIKO_ARGS_FILE")"
    # Step 2: Run Kaniko with dynamically injected --build-arg flags.
    # EXTRA_ARGS are passed via 'args' (Tekton only allows array expansion there),
    # then consumed as "$@" in the script. Build-arg flags are read from the
    # shared workspace file written by step 1.
    #
    # Uses `set --` to build a proper argument array instead of string
    # concatenation, so values containing spaces (e.g. VITE_OIDC_SCOPE=
    # "openid profile email offline_access") are preserved correctly.
    - name: build-and-push
      workingDir: $(workspaces.source.path)
      image: $(params.BUILDER_IMAGE)
      args:
        - $(params.EXTRA_ARGS[*])
      script: |
        #!/busybox/sh
        set -e

        KANIKO_ARGS_FILE="$(workspaces.source.path)/.tekton-kaniko-build-args"

        # Save EXTRA_ARGS (passed via Tekton args as "$@") to a temp file
        # before we overwrite $@ with the kaniko command.
        EXTRA_FILE="$(workspaces.source.path)/.tekton-extra-args"
        : > "$EXTRA_FILE"
        for arg in "$@"; do
          printf '%s\n' "$arg" >> "$EXTRA_FILE"
        done

        # Build the kaniko command as a proper argument array.
        set -- /kaniko/executor \
          "--dockerfile=$(params.DOCKERFILE)" \
          "--context=$(workspaces.source.path)/$(params.CONTEXT)" \
          "--destination=$(params.IMAGE)" \
          "--digest-file=$(results.IMAGE_DIGEST.path)"

        # Append EXTRA_ARGS back from the temp file
        if [ -s "$EXTRA_FILE" ]; then
          while IFS= read -r arg; do
            [ -n "$arg" ] || continue
            set -- "$@" "$arg"
          done < "$EXTRA_FILE"
        fi

        # Append --build-arg flags from .build-args file
        if [ -s "$KANIKO_ARGS_FILE" ]; then
          echo "[build] Injecting build-arg flags from .build-args:"
          while IFS= read -r flag; do
            [ -n "$flag" ] || continue
            # Log key only for security
            echo "  $(echo "$flag" | cut -d'=' -f1-2)=***"
            set -- "$@" "$flag"
          done < "$KANIKO_ARGS_FILE"
        fi

        echo "$@ [build] Executing kaniko with $(($# - 1)) flags..."
        exec "$@"
      securityContext:
        runAsUser: 0
    - name: write-url
      image: $(params.WRITER_IMAGE)
      script: |
        set -e
        image="$(params.IMAGE)"
        protocol="$(params.PROTOCOL)"
        printf "%s://%s" "$protocol" "$image" | tee "$(results.IMAGE_URL.path)"

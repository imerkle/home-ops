apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-token-refresher
  namespace: crossplane-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-token-refresher
  namespace: crossplane-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-token-refresher
  namespace: crossplane-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-token-refresher
subjects:
  - kind: ServiceAccount
    name: vault-token-refresher
    namespace: crossplane-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-token-refresher
  namespace: crossplane-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-token-refresher
  template:
    metadata:
      labels:
        app: vault-token-refresher
    spec:
      serviceAccountName: vault-token-refresher
      containers:
        - name: refresher
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              apk add --no-cache curl jq
              while true; do
                echo "Attempting to fetch new Vault token..."
                JWT=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                RESPONSE=$(curl -s --fail --request POST --data '{"jwt": "'"$JWT"'", "role": "crossplane"}' http://vault.vault:8200/v1/auth/kubernetes/login || echo "")
                TOKEN=$(echo "$RESPONSE" | jq -r '.auth.client_token // empty')
                
                if [ -n "$TOKEN" ]; then
                  echo "Successfully fetched token. Updating secret..."
                  kubectl create secret generic vault-creds-json -n crossplane-system --from-literal=credentials="{\"token\": \"$TOKEN\"}" --dry-run=client -o yaml | kubectl apply -f -
                  # Token TTL is 1h, sleep for 30m
                  sleep 1800
                else
                  echo "Failed to fetch token. Response: $RESPONSE"
                  sleep 15
                fi
              done

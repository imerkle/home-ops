---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app auth-server
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      auth-server:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: zot.${DOMAIN1}/auth-server
              tag: 705472f35c88deca648effc1bbc1d39b9b50fab7
            env:
              PORT: &port "3000"
              GRPC_PORT: &grpcPort "50051"
              BASE_URL: "https://auth-server.${DOMAIN1}"
              OIDC_ISSUER: "https://zitadel.${DOMAIN1}"
              OIDC_CLIENT_ID: "vault:secret/data/ext_services#OIDC_CLIENT_ID"
              OIDC_CLIENT_SECRET: "vault:secret/data/ext_services#OIDC_CLIENT_SECRET"
              OIDC_REDIRECT_URL: "https://auth-server.${DOMAIN1}/auth/callback"
              OIDC_SESSION_KEY: "super-secret-session-key-change-me"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: auth-server
        ports:
          http:
            port: *port
          grpc:
            port: *grpcPort
    route:
      app:
        hostnames:
          - "auth-server.${DOMAIN1}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - port: *port
                name: *app

---
apiVersion: v1
kind: Secret
metadata:
  name: email-fetcher-secret
stringData:
  R2_ENDPOINT: "https://$${vault:secret/data/cloudflare#ACCOUNT_ID}.r2.cloudflarestorage.com"
  R2_BUCKET: "home-ops-email-inbox"
  AWS_ACCESS_KEY_ID: vault:secret/data/cloudflare#AWS_ACCESS_KEY_ID
  AWS_SECRET_ACCESS_KEY: vault:secret/data/cloudflare#AWS_SECRET_ACCESS_KEY
  AWS_DEFAULT_REGION: "auto"
  STALWART_URL: "http://stalwart-stalwart-mail.home-system.svc.cluster.local:80/.well-known/jmap"
  STALWART_TOKEN: "supersecret"
  STALWART_ACCOUNT_ID: "admin"

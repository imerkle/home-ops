---
# Tekton Task: deploy-preview
# Clones home-ops, generates preview manifests for a branch, commits & pushes.
# Apps opt in by having a preview/helmrelease.tmpl.yaml alongside their app/ dir.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-preview
  labels:
    app.kubernetes.io/part-of: tekton-tasks
spec:
  description: >-
    Generates branch-preview Kubernetes manifests from a preview template
    and commits them to the home-ops GitOps repo so Flux deploys them.
  params:
    - name: repo-name
      description: Repository/app name (e.g. game-fetcher).
      type: string
    - name: branch
      description: Sanitized branch name (e.g. feature-cool).
      type: string
    - name: home-ops-url
      description: SSH URL of the home-ops repository.
      type: string
      default: git@github.com:imerkle/home-ops.git
    - name: apps-base-path
      description: Path within home-ops where prod-system apps live.
      type: string
      default: kubernetes/apps/prod-system
  workspaces:
    - name: ssh-credentials
      description: >-
        Secret volume containing identity (private key), identity.pub,
        and known_hosts for SSH push access to home-ops.
      mountPath: /root/.ssh-secret
  steps:
    - name: clone-and-deploy
      image: alpine/git:2.43.0
      script: |
        #!/bin/sh
        set -eu

        REPO_NAME="$(params.repo-name)"
        BRANCH="$(params.branch)"
        HOME_OPS_URL="$(params.home-ops-url)"
        APPS_BASE="$(params.apps-base-path)"

        PREVIEW_DIR="$${APPS_BASE}/apps/$${REPO_NAME}/preview"
        TEMPLATE_FILE="$${PREVIEW_DIR}/helmrelease.tmpl.yaml"
        DEPLOY_DIR="$${APPS_BASE}/apps/$${REPO_NAME}-$${BRANCH}"
        KS_FILE="$${APPS_BASE}/kustomization.yaml"

        # ── SSH setup ──────────────────────────────────────────────────────────
        mkdir -p /root/.ssh
        cp /root/.ssh-secret/identity     /root/.ssh/id_ed25519
        cp /root/.ssh-secret/identity.pub /root/.ssh/id_ed25519.pub
        cp /root/.ssh-secret/known_hosts  /root/.ssh/known_hosts
        chmod 600 /root/.ssh/id_ed25519
        chmod 644 /root/.ssh/id_ed25519.pub /root/.ssh/known_hosts

        git config --global user.email "tekton-preview@cluster.local"
        git config --global user.name  "Tekton Preview Bot"

        # ── Clone home-ops ─────────────────────────────────────────────────────
        git clone --depth=1 "$${HOME_OPS_URL}" /workspace/home-ops
        cd /workspace/home-ops

        # ── Opt-in check ───────────────────────────────────────────────────────
        if [ ! -f "$${TEMPLATE_FILE}" ]; then
          echo "No preview template found at $${TEMPLATE_FILE} — skipping."
          exit 0
        fi

        # ── Idempotent: skip if already deployed ───────────────────────────────
        if [ -d "$${DEPLOY_DIR}" ]; then
          echo "Preview $${DEPLOY_DIR} already exists — skipping."
          exit 0
        fi

        # ── Generate preview manifests ─────────────────────────────────────────
        mkdir -p "$${DEPLOY_DIR}/app"

        sed "s/__BRANCH__/$${BRANCH}/g" "$${TEMPLATE_FILE}" \
          > "$${DEPLOY_DIR}/app/helmrelease.yaml"

        cat > "$${DEPLOY_DIR}/app/kustomization.yaml" << EOF
        ---
        # yaml-language-server: \$schema=https://json.schemastore.org/kustomization
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - ./helmrelease.yaml
        EOF

        cat > "$${DEPLOY_DIR}/ks.yaml" << EOF
        ---
        # yaml-language-server: \$schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: &app $${REPO_NAME}-$${BRANCH}
          namespace: &namespace prod-system
        spec:
          targetNamespace: *namespace
          commonMetadata:
            labels:
              app.kubernetes.io/name: *app
          path: ./$${DEPLOY_DIR}/app
          prune: true
          sourceRef:
            kind: GitRepository
            name: home-kubernetes
            namespace: flux-system
          wait: true
          interval: 30m
          retryInterval: 1m
          timeout: 5m
          postBuild:
            substitute:
              APP: *app
        EOF

        # ── Patch prod-system/kustomization.yaml ───────────────────────────────
        KS_ENTRY="  - ./apps/$${REPO_NAME}-$${BRANCH}/ks.yaml"
        if ! grep -qF "$${KS_ENTRY}" "$${KS_FILE}"; then
          echo "$${KS_ENTRY}" >> "$${KS_FILE}"
        fi

        # ── Commit and push ────────────────────────────────────────────────────
        git add "$${DEPLOY_DIR}" "$${KS_FILE}"
        git commit -m "feat(preview): deploy $${REPO_NAME}:$${BRANCH} preview"
        git push origin HEAD
        echo "Preview deployed: $${DEPLOY_DIR}"

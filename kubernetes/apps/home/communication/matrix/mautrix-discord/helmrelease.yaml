---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mautrix-discord
  labels:
    security.banzaicloud.io/mutate: skip
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      mautrix-discord:
        labels:
          postgres: "true"
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          copy-config:
            image:
              repository: public.ecr.aws/docker/library/busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - sed -e "s/\${DB_USER}/${DB_USER}/g" -e "s/\${DB_PASS}/${DB_PASS}/g" /tmp/config/config.yaml > /data/config.yaml
            env:
              DB_USER:
                valueFrom:
                  secretKeyRef:
                    name: mautrix-discord-db-creds
                    key: username
              DB_PASS:
                valueFrom:
                  secretKeyRef:
                    name: mautrix-discord-db-creds
                    key: password
        containers:
          app:
             image:
               repository: dock.mau.dev/mautrix/discord
               tag: v0.7.1
             command: ["/usr/bin/mautrix-discord"]
             args: [ "-c", "/data/config.yaml", "--no-update" ]
             env:
               TZ: ${TIMEZONE}
               DB_USER:
                 valueFrom:
                   secretKeyRef:
                     name: mautrix-discord-db-creds
                     key: username
               DB_PASS:
                 valueFrom:
                   secretKeyRef:
                     name: mautrix-discord-db-creds
                     key: password
             securityContext:
               allowPrivilegeEscalation: false
               readOnlyRootFilesystem: true
               capabilities: {drop: ["ALL"]}
             resources:
               requests:
                 cpu: 10m
                 memory: 128Mi
               limits:
                 memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 8000
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 404"]
        hostnames:
          - "{{ .Release.Name }}.${DOMAIN1}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
    persistence:
      config:
        type: configMap
        name: mautrix-discord-config
        advancedMounts:
          mautrix-discord:
            copy-config:
              - path: /tmp/config
      data:
        type: emptyDir
        globalMounts:
          - path: /data
      tmpfs:
        type: emptyDir
        advancedMounts:
          mautrix-discord:
            app:
              - path: /tmp
                subPath: tmp

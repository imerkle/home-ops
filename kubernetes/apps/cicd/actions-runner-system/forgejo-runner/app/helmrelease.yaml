---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      forgejo-runner:
        annotations:
          reloader.stakater.com/auto: "true"
          vault.security.banzaicloud.io/vault-role: "default"
        containers:
          app:
            image:
              repository: code.forgejo.org/forgejo/runner
              tag: 12
            env:
              FORGEJO_INSTANCE_URL: "http://forgejo.dev-system.svc.cluster.local:3000"
              FORGEJO_RUNNER_SECRET: "vault:secret/data/forgejo#TOKEN"
              DOCKER_HOST: "unix:///socket/docker.sock"
            command:
              - /bin/sh
              - -c
              - |
                # Wait for Docker socket to be ready
                echo "Waiting for Docker daemon to be ready at /socket/docker.sock..."
                while [ ! -S /socket/docker.sock ]; do
                  sleep 2
                done

                if [ ! -f /data/config.yaml ]; then
                  echo "Generating config..."
                  forgejo-runner generate-config > /data/config.yaml
                  # Update the docker_host in config to point to the shared socket
                  sed -i 's|docker_host: "-"|docker_host: "unix:///socket/docker.sock"|g' /data/config.yaml
                fi

                if [ ! -f /data/.runner ]; then
                  echo "Registering runner..."
                  forgejo-runner register \
                    --instance "$FORGEJO_INSTANCE_URL" \
                    --token "$FORGEJO_RUNNER_SECRET" \
                    --name "forgejo-runner-k8s" \
                    --no-interactive
                fi

                echo "Starting runner..."
                forgejo-runner daemon --config /data/config.yaml
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Mi
          dind:
            image:
              repository: docker
              tag: 24-dind
            env:
              DOCKER_TLS_CERTDIR: ""
            args:
              - dockerd
              - --host=unix:///socket/docker.sock
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi

    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /data
      docker-socket:
        type: emptyDir
        globalMounts:
          - path: /socket

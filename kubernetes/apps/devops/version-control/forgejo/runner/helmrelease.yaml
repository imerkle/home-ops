---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      forgejo-runner:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: code.forgejo.org/forgejo/runner
              tag: 12
            env:
              FORGEJO_INSTANCE_URL: "http://forgejo.dev-system.svc.cluster.local:3000"
              FORGEJO_RUNNER_SECRET: "vault:secret/data/forgejo#TOKEN"
            command:
              - /bin/sh
              - -c
              - |
                if [ ! -f /data/.runner ]; then
                  echo "Creating runner registration file..."
                  forgejo-runner create-runner-file \
                    --instance "$FORGEJO_INSTANCE_URL" \
                    --secret "$FORGEJO_RUNNER_SECRET" \
                    --connect
                fi
                echo "Starting runner..."
                forgejo-runner daemon
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Mi

    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /data
      # If jobs need docker, we might need a dind sidecar or socket mount.
      # For now, following the specific command provided.

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ps4-fpkgi
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      ps4-fpkgi:
        containers:
          app:
            image:
              repository: openorbisofficial/toolchain
              tag: latest
            env:
              SERVER_URL: "http://10.0.0.30/"
            securityContext:
              runAsUser: 0
              runAsGroup: 0
            command:
              - /bin/sh
              - -c
              - |
                apt-get update && apt-get install -y jq
                # Keep container running for testing
                sleep infinity
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
          nginx:
            image:
              repository: nginx
              tag: alpine
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    service:
      app:
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: 10.0.0.30
        controller: ps4-fpkgi
        ports:
          http:
            port: 80
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${DOMAIN1}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      scripts:
        type: configMap
        name: ps4-fpkgi-scripts
        advancedMounts:
          ps4-fpkgi:
            app:
              - path: /workspace/ps4-fpkgi-json.sh
                subPath: ps4-fpkgi-json.sh
                readOnly: true
      nginx-config:
        type: configMap
        name: ps4-fpkgi-nginx
        advancedMounts:
          ps4-fpkgi:
            nginx:
              - path: /etc/nginx/conf.d/default.conf
                subPath: default.conf
                readOnly: true
      workspace:
        existingClaim: copyparty-hdd
        globalMounts:
          - path: /workspace
            subPath: downloads/ps4

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zitadel
  labels:
    security.banzaicloud.io/mutate: skip
spec:
  timeout: 15m
  chart:
    spec:
      chart: zitadel
      version: "10.0.2"
      sourceRef:
        kind: HelmRepository
        name: zitadel
        namespace: zitadel
  values:
    env:
      - name: ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME
        valueFrom:
          secretKeyRef:
            name: zitadel-db-creds
            key: username
      - name: ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD
        valueFrom:
          secretKeyRef:
            name: zitadel-db-creds
            key: password
      - name: ZITADEL_DATABASE_POSTGRES_USER_USERNAME
        valueFrom:
          secretKeyRef:
            name: zitadel-db-creds
            key: username
      - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
        valueFrom:
          secretKeyRef:
            name: zitadel-db-creds
            key: password
      - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS
        value: admin@admin.com
      - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD
        value: RootPassword1!
        #new RootPassword1!!
      - name: ZITADEL_OIDC_DEFAULTACCESSTOKENLIFETIME
        value: 12h
      - name: ZITADEL_OIDC_DEFAULTIDTOKENLIFETIME
        value: 12h
      - name: ZITADEL_OIDC_DEFAULTREFRESHTOKENIDLEEXPIRATION
        value: 720h
      - name: ZITADEL_OIDC_DEFAULTREFRESHTOKENEXPIRATION
        value: 2160h
      - name: ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_PASSWORDCHECKLIFETIME
        value: 240h
      - name: ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_EXTERNALLOGINCHECKLIFETIME
        value: 240h
      - name: ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_MFAINITSKIPLIFETIME
        value: 720h
      - name: ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_SECONDFACTORCHECKLIFETIME
        value: 22h
      - name: ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_MULTIFACTORCHECKLIFETIME
        value: 22h
      - name: ZITADEL_DEFAULTINSTANCE_OIDCSETTINGS_ACCESSTOKENLIFETIME
        value: 22h
      - name: ZITADEL_DEFAULTINSTANCE_OIDCSETTINGS_IDTOKENLIFETIME
        value: 12h
      - name: ZITADEL_DEFAULTINSTANCE_OIDCSETTINGS_REFRESHTOKENIDLEEXPIRATION
        value: 720h
      - name: ZITADEL_DEFAULTINSTANCE_OIDCSETTINGS_REFRESHTOKENEXPIRATION
        value: 2160h
    replicaCount: 1
    resources:
      requests:
        cpu: 15m
        memory: 248Mi
    login:
      customConfigmapConfig: |-
        ZITADEL_LOGINCLIENT_KEYFILE="/login-service-key/tls.key"
        AUDIENCE="https://zitadel.${DOMAIN1}"
        ZITADEL_API_URL="http://zitadel:8080"
        CUSTOM_REQUEST_HEADERS="Host:zitadel.${DOMAIN1},X-Zitadel-Public-Host:zitadel.${DOMAIN1}"

    zitadel:
      env:
        - name: ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME
          valueFrom:
            secretKeyRef:
              name: zitadel-db-creds
              key: username
        - name: ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zitadel-db-creds
              key: password
        - name: ZITADEL_DATABASE_POSTGRES_USER_USERNAME
          valueFrom:
            secretKeyRef:
              name: zitadel-db-creds
              key: username
        - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zitadel-db-creds
              key: password
      masterkey: vault:secret/data/zitadel#MASTERKEY
      configmapConfig:
        ExternalDomain: &host "zitadel.${DOMAIN1}"
        ExternalSecure: false
        TLS:
          Enabled: false
      secretConfig:
        ExternalDomain: *host
        ExternalSecure: true
        ExternalPort: 443
        Database:
          postgres:
            Host: pg-default-rw.db.svc.cluster.local
            Port: 5432
            Database: zitadel
            MaxOpenConns: 40
            MaxIdleConns: 20
            MaxConnLifetime: 30m
            MaxConnIdleTime: 5m
            User:
              Username: dummy
              Password: dummy
              SSL:
                Mode: disable
            Admin:
              Username: dummy
              Password: dummy
              SSL:
                Mode: disable

    ingress:
      enabled: false
      className: "internal"
      annotations: {}
      hosts:
        - host: *host
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - *host

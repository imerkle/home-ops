---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-cleanup
  namespace: tekton-pipelines
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tekton-cleanup-role
rules:
  - apiGroups:
      - tekton.dev
    resources:
      - taskruns
      - pipelineruns
    verbs:
      - get
      - list
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-cleanup-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-cleanup-role
subjects:
  - kind: ServiceAccount
    name: tekton-cleanup
    namespace: tekton-pipelines
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tekton-cleanup
  namespace: tekton-pipelines
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: tekton-cleanup
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
              args:
                - |
                  echo "Cleaning up completed or failed PipelineRuns..."
                  kubectl get pr -A -o=custom-columns=NS:.metadata.namespace,NAME:.metadata.name,STATUS:.status.conditions[0].status --no-headers | awk '$3=="True" || $3=="False" {print $1, $2}' | while read ns name; do
                    kubectl delete pr "$name" -n "$ns"
                  done
                  
                  echo "Cleaning up completed or failed TaskRuns..."
                  kubectl get tr -A -o=custom-columns=NS:.metadata.namespace,NAME:.metadata.name,STATUS:.status.conditions[0].status --no-headers | awk '$3=="True" || $3=="False" {print $1, $2}' | while read ns name; do
                    kubectl delete tr "$name" -n "$ns"
                  done
                  
                  echo "Cleanup finished."
          restartPolicy: OnFailure

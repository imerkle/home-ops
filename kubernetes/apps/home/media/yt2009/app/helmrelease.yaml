---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: yt2009
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      yt2009:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: zot.x3y.space/yt2009
              tag: latest
              pullPolicy: Always
            env:
              YT2009_ENV: dev
              YT2009_PORT: 80
              YT2009_IP: "127.0.0.1"
              YT2009_SSL: "false"
              YT2009_AUTO_MAINTAIN: "false"
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: yt2009
        ports:
          http:
            port: 80
    route:
      app:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - "yt2009.x3y.space"
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/name: yt2009
          gethomepage.dev/icon: mdi-youtube
    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /data

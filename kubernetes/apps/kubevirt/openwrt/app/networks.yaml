---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/k8s.cni.cncf.io/networkattachmentdefinition_v1.json
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: wan-net
spec:
  config: '{
      "cniVersion": "0.3.1",
      "name": "wan-net",
      "plugins": [
        {
          "type": "macvlan",
          "master": "${OPENWRT_WAN_LINK}",
          "mode": "passthru",
          "ipam": {}
        },
        {
          "type": "tuning",
          "capabilities": {"mac": true}
        }
      ]
    }'
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/k8s.cni.cncf.io/networkattachmentdefinition_v1.json
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: lan-net
spec:
  config: '{
      "cniVersion": "0.3.1",
      "name": "lan-net",
      "plugins": [
        {
          "type": "macvlan",
          "master": "${OPENWRT_LAN_LINK}",
          "mode": "passthru",
          "ipam": {}
        },
        {
          "type": "tuning",
          "capabilities": {"mac": true}
        }
      ]
    }'

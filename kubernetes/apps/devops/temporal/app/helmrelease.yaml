---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: temporal
  labels:
    security.banzaicloud.io/mutate: skip
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      temporal:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: temporalio/auto-setup
              tag: 1.24.2
            env:
              DB: postgres12
              DB_PORT: "5432"
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: temporal-db-creds
                    key: username
              POSTGRES_PWD:
                valueFrom:
                  secretKeyRef:
                    name: temporal-db-creds
                    key: password
              POSTGRES_SEEDS: "pg-default-rw.db.svc.cluster.local"
              SKIP_DB_CREATE: "true"
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
          ui:
            image:
              repository: temporalio/ui
              tag: 2.27.0
            env:
              TEMPORAL_ADDRESS: "temporal:7233"
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: temporal
        ports:
          http:
            port: 8080
          grpc:
            port: 7233
    route:
      app:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - "temporal.${DOMAIN1}"
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Temporal
          gethomepage.dev/description: Workflow Orchestration
          gethomepage.dev/group: Development
        rules:
          - backendRefs:
              - port: 8080
                name: temporal

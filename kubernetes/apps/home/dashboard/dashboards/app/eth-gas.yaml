---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: eth-gas
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  json: >
    {
      "title": "Ethereum Gas Details",
      "refresh": "1m",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "uid": "eth-gas-custom",
      "schemaVersion": 39,
      "panels": [
        {
          "type": "stat",
          "title": "Current Gas Price (Gwei)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "eth_gas_price_gwei",
              "refId": "A",
              "instant": true
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Gas Price History (Gwei)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "datasource": {
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "eth_gas_price_gwei",
              "refId": "A"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "single"
            }
          }
        }
      ]
    }

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zealot
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  values:
    controllers:
      zealot:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            vault.security.banzaicloud.io/vault-env-daemon: "true"
        containers:
          app:
            image:
              repository: tryzealot/zealot
              tag: nightly
            env:
              PORT: &port 80
              ZEALOT_ADMIN_EMAIL: admin@admin.com
              ZEALOT_ADMIN_PASSWORD: password
              ZEALOT_DOMAIN: "{{ .Release.Name }}.${DOMAIN1}"
              ZEALOT_DATABASE_URL: "postgresql://$${vault:database/creds/zealot-role#username}:$${vault:database/creds/zealot-role#password}@pg-default-rw.db.svc.cluster.local:5432/zealot?sslmode=disable"
              SECRET_TOKEN: "85dbe15d75ef9308c7ae0f33c7a324cc6f4bf519a2ed2f3027bd33c140a4f9aa"
              SECRET_KEY_BASE: "85dbe15d75ef9308c7ae0f33c7a324cc6f4bf519a2ed2f3027bd33c140a4f9aa"
              DEFAULT_LOCALE: en
              OIDC_ENABLED: "true"
              OIDC_DISCOVERY: "true"
              OIDC_NAME: "Zitadel"
              OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: zealot-oidc-creds
                    key: client_id
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: zealot-oidc-creds
                    key: client_secret
              OIDC_SCOPE: "openid,email,profile"
              OIDC_RESPONSE_TYPE: "code"
              OIDC_UID_FIELD: "preferred_username"
              OIDC_ISSUER_URL: "https://zitadel.${DOMAIN1}"
              OIDC_AUTH_URI: "/oauth/v2/authorize"
              OIDC_TOKEN_URI: "/oauth/v2/token"
              OIDC_USERINFO_URI: "/oidc/v1/userinfo"
    service:
      app:
        controller: zealot
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Zealot
          gethomepage.dev/description: OTA Updates
          gethomepage.dev/group: Development
          gethomepage.dev/icon: zealot.png
        hostnames:
          - "{{ .Release.Name }}.${DOMAIN1}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
      uploads:
        existingClaim: zealot-uploads
        globalMounts:
          - path: /app/public/uploads

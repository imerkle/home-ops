apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: temporal-db-creds
  namespace: dev-system
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: temporal-db-creds
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: username
      remoteRef:
        key: database/static-creds/temporal-static
        property: username
    - secretKey: password
      remoteRef:
        key: database/static-creds/temporal-static
        property: password

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mautrix-telegram
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      mautrix-telegram:
        labels:
          postgres: "true"
        annotations:
          reloader.stakater.com/auto: "true"
          vault.security.banzaicloud.io/vault-role: "default"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 16.4
            env:
              INIT_POSTGRES_DBNAME: "mautrix-telegram"
              INIT_POSTGRES_HOST: "pg-default-rw.db.svc.cluster.local"
              INIT_POSTGRES_USER: "vault:database/creds/init-role#username"
              INIT_POSTGRES_PASS: "vault:database/creds/init-role#password"
              PGDATABASE: "postgres"
              INIT_POSTGRES_SUPER_USER: "vault:database/creds/init-role#username"
              INIT_POSTGRES_SUPER_PASS: "vault:database/creds/init-role#password"
          init-db-grants:
            image:
              repository: ghcr.io/cloudnative-pg/postgresql
              tag: "15.2-11"
            command: ["/bin/sh", "-c"]
            args:
              - |
                until pg_isready -h pg-default-rw.db.svc.cluster.local -U "$SUPER_USER"; do sleep 2; done
                psql "postgresql://$SUPER_USER:$SUPER_PASS@pg-default-rw.db.svc.cluster.local:5432/mautrix-telegram" -c "
                  GRANT CONNECT ON DATABASE \"mautrix-telegram\" TO PUBLIC;
                  GRANT ALL PRIVILEGES ON SCHEMA public TO PUBLIC;
                  GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO PUBLIC;
                  GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO PUBLIC;
                  ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO PUBLIC;
                  ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO PUBLIC;
                "
            env:
              SUPER_USER: "vault:database/creds/init-role#username"
              SUPER_PASS: "vault:database/creds/init-role#password"
          copy-config:
            image:
              repository: public.ecr.aws/docker/library/busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - cp /tmp/config/* /data/
        containers:
          app:
            image:
              repository: dock.mau.dev/mautrix/telegram
              tag: v0.15.3
            command: ["python3", "-m", "mautrix_telegram"]
            args: [ "-c", "/data/config.yaml", "--no-update" ]
            env:
              TZ: America/New_York
              # MAUTRIX_DIRECT_STARTUP: false
              # DB_USER: "vault:secret/data/pg_default#USER"
              # DB_PASS: "vault:secret/data/pg_default#PASSWORD"
              # DB_HOST: "vault:secret/data/pg_default#HOST"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 29317
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 404"]
        hostnames:
          - "{{ .Release.Name }}.x3y.space"
        parentRefs:
          - name: envoy-internal
            namespace: networking
    persistence:
      config:
        type: configMap
        name: mautrix-telegram-config
        advancedMounts:
          mautrix-telegram:
            copy-config:
              - path: /tmp/config
      data:
        existingClaim: mautrix-telegram
        globalMounts:
          - path: /data
      tmpfs:
        type: emptyDir
        advancedMounts:
          mautrix-telegram:
            app:
              - path: /tmp
                subPath: tmp

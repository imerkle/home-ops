---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app coder
  namespace: &namespace dev-system
spec:
  components:
    - ../../../../components/volsync
  targetNamespace: *namespace
  path: ./kubernetes/apps/devops/ide/code-server/
  dependsOn:
    - name: zitadel-app
      namespace: zitadel
    - name: vault
      namespace: vault
    - name: pg-clusters-default
      namespace: db
  postBuild:
    substitute:
      APP: *app
      # GATUS_PATH: /web/index.html
      VOLSYNC_CAPACITY: 5Gi
      # REDIRECT_URI: https://coder.${DNS_MAIN}/api/v2/users/oidc/callback
      # LOGOUT_URI: https://coder.${DNS_MAIN}/api/v2/users/logout
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-operator
  namespace: vault
spec:
  chart:
    spec:
      chart: vault-operator
      version: 1.23.4
      sourceRef:
        name: bank-vaults
        kind: HelmRepository
        namespace: vault
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-secrets-webhook
  namespace: vault
spec:
  chart:
    spec:
      chart: vault-secrets-webhook
      version: 1.21.1
      sourceRef:
        name: bank-vaults
        kind: HelmRepository
        namespace: vault
  values:
    env:
      VAULT_ADDR: "http://vault.vault.svc.cluster.local:8200"
      VAULT_ROLE: "default"
    customResourceMutations: ["pods","clusterissuers","backendsecuritypolicies","configmaps","secrets"]
    configMapMutation: true
    replicaCount: 1
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: MutatingWebhookConfiguration
              name: vault-secrets-webhook
            patch: |-
              - op: remove
                path: /webhooks/0/namespaceSelector/matchExpressions/1
              - op: remove
                path: /webhooks/1/namespaceSelector/matchExpressions/1
              - op: remove
                path: /webhooks/2/namespaceSelector/matchExpressions/1
              - op: remove
                path: /webhooks/3/namespaceSelector/matchExpressions/1